<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="60" cy="80" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="440" cy="60" r="1" fill="white" opacity="0.4"/>
  <circle cx="380" cy="140" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="120" cy="420" r="1" fill="white" opacity="0.4"/>
  <circle cx="460" cy="380" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="70" cy="300" r="1" fill="white" opacity="0.3"/>
  <!-- Neon pipes -->
  <rect x="75" y="0" width="28" height="140" rx="8" fill="#00ff88" opacity="0.3" filter="url(#glow)"/>
  <rect x="75" y="370" width="28" height="142" rx="8" fill="#00ff88" opacity="0.3" filter="url(#glow)"/>
  <rect x="410" y="0" width="28" height="190" rx="8" fill="#ff00ff" opacity="0.3" filter="url(#glow)"/>
  <rect x="410" y="360" width="28" height="152" rx="8" fill="#ff00ff" opacity="0.3" filter="url(#glow)"/>
  <!-- Bird body -->
  <ellipse cx="256" cy="250" rx="72" ry="56" fill="#00eeff" filter="url(#glow-strong)" opacity="0.9"/>
  <ellipse cx="256" cy="250" rx="58" ry="44" fill="#0a0a2e"/>
  <ellipse cx="256" cy="250" rx="48" ry="36" fill="#00ccff" opacity="0.15"/>
  <!-- Eye -->
  <circle cx="288" cy="232" r="15" fill="white"/>
  <circle cx="293" cy="230" r="7.5" fill="#0a0014"/>
  <circle cx="295" cy="228" r="2.5" fill="white" opacity="0.8"/>
  <!-- Wing -->
  <path d="M208 250 Q158 200 178 165 Q200 185 220 230 Z" fill="#00ff88" filter="url(#glow)" opacity="0.8"/>
  <!-- Beak -->
  <polygon points="320,244 358,252 320,262" fill="#ffee00" filter="url(#glow)"/>
  <!-- Trail -->
  <line x1="184" y1="250" x2="100" y2="250" stroke="#00eeff" stroke-width="6" stroke-linecap="round" opacity="0.5" filter="url(#glow)"/>
  <line x1="145" y1="250" x2="60" y2="250" stroke="#00eeff" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
  <!-- Title text -->
  <text x="256" y="440" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-size="56" font-weight="900" fill="#00eeff" filter="url(#glow-text)" letter-spacing="4">NEON DRIFT</text>
</svg>
