<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff00e6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- BG -->
  <rect width="64" height="64" rx="12" fill="#0a0a1a"/>
  <rect width="64" height="64" rx="12" fill="url(#g)"/>
  <!-- Hex ring -->
  <polygon points="32,12 46,20 46,36 32,44 18,36 18,20" fill="none" stroke="#ff00e6" stroke-width="2" filter="url(#neon)" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="32" cy="28" r="8" fill="none" stroke="#00f0ff" stroke-width="1.5" filter="url(#neon)" opacity="0.8"/>
  <!-- Core orb -->
  <circle cx="32" cy="28" r="4" fill="#00f0ff"/>
  <circle cx="32" cy="28" r="2.5" fill="#ffffff" opacity="0.7"/>
  <!-- Thrust -->
  <line x1="32" y1="44" x2="32" y2="54" stroke="#ff00e6" stroke-width="2.5" stroke-linecap="round" filter="url(#neon)"/>
  <line x1="28" y1="44" x2="27" y2="51" stroke="#ff00e6" stroke-width="1.5" stroke-linecap="round" filter="url(#neon)" opacity="0.6"/>
  <line x1="36" y1="44" x2="37" y2="51" stroke="#ff00e6" stroke-width="1.5" stroke-linecap="round" filter="url(#neon)" opacity="0.6"/>
  <!-- Ground line -->
  <line x1="4" y1="58" x2="60" y2="58" stroke="#ff00e6" stroke-width="1.5" filter="url(#neon)" opacity="0.5"/>
</svg>
