<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<title>Flappy Neon</title>
<!-- Google AdSense — zamień ca-pub-XXXX na swoje ID z https://adsense.google.com -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXX" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a1a;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* === HUD === */
  #score-display {
    position: fixed; top: max(env(safe-area-inset-top), 20px);
    left: 50%; transform: translateX(-50%);
    font-size: clamp(32px, 7vw, 56px);
    font-weight: 900; color: #fff;
    text-shadow: 0 0 10px rgba(0,240,255,0.8), 0 2px 4px rgba(0,0,0,0.5);
    z-index: 20; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  #score-display.visible { opacity: 1; }
  #coin-hud {
    position: fixed; top: max(env(safe-area-inset-top), 20px); right: 16px;
    font-size: 16px; font-weight: 700; color: #ffee00;
    text-shadow: 0 0 8px rgba(255,238,0,0.5);
    z-index: 20; pointer-events: none;
    display: flex; align-items: center; gap: 4px;
  }
  #coin-hud .coin-icon {
    width: 20px; height: 20px;
    background: radial-gradient(circle, #ffee00 40%, #ff9900);
    border-radius: 50%;
    border: 2px solid #ffaa00;
    display: inline-block;
  }

  /* === Overlays === */
  .overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 30;
  }
  .overlay.active { display: flex; }

  /* === Menu === */
  .menu-title {
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 900;
    background: linear-gradient(135deg, #00f0ff, #ff00e6, #ffee00);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(0,240,255,0.5));
    margin-bottom: 8px; letter-spacing: -2px;
  }
  .menu-sub {
    color: rgba(255,255,255,0.5); font-size: clamp(13px, 3vw, 18px);
    margin-bottom: 32px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .menu-buttons { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    color: #fff; font-size: 16px; font-weight: 600;
    padding: 14px 40px; cursor: pointer;
    transition: all 0.2s;
    min-width: 200px; text-align: center;
    backdrop-filter: blur(10px);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); background: rgba(255,255,255,0.12); }
  .btn-primary { background: rgba(0,200,255,0.15); border-color: rgba(0,200,255,0.4); color: #00e0ff; }
  .btn-gold { background: rgba(255,200,0,0.12); border-color: rgba(255,200,0,0.35); color: #ffee00; }
  .btn-small { font-size: 13px; padding: 10px 24px; min-width: auto; }

  .daily-badge {
    position: absolute; top: -6px; right: -6px;
    background: #ff4466; color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 8px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  /* === Panels === */
  .panel {
    background: rgba(10,10,30,0.94);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 28px 36px;
    text-align: center; backdrop-filter: blur(20px);
    transform: scale(0.8); opacity: 0;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 340px; width: 90vw;
  }
  .panel.show { transform: scale(1); opacity: 1; }
  .panel h2 { font-size: clamp(22px, 5vw, 32px); margin-bottom: 12px; }
  .stat-row {
    display: flex; justify-content: space-between;
    padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .stat-label { color: rgba(255,255,255,0.5); font-size: 13px; }
  .stat-value { color: #fff; font-weight: 700; font-size: 16px; }
  .stat-value.new-best { color: #ffee00; }
  .medal { font-size: 44px; margin: 8px 0; filter: drop-shadow(0 0 12px rgba(255,200,0,0.6)); }
  .coins-earned { color: #ffee00; font-weight: 700; font-size: 18px; margin: 8px 0; }
  .go-buttons { display: flex; gap: 10px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }

  /* === Shop === */
  .shop-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin: 16px 0; max-height: 50vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .skin-card {
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 12px 8px;
    text-align: center; cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .skin-card:active { transform: scale(0.95); }
  .skin-card.owned { border-color: rgba(0,200,255,0.3); }
  .skin-card.equipped { border-color: #00f0ff; background: rgba(0,200,255,0.1); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
  .skin-card.locked { opacity: 0.5; }
  .skin-preview { width: 42px; height: 42px; margin: 0 auto 6px; border-radius: 50%; }
  .skin-name { font-size: 11px; font-weight: 600; color: #fff; margin-bottom: 3px; }
  .skin-price { font-size: 11px; color: #ffee00; font-weight: 600; }
  .skin-price.free { color: #00ff88; }

  /* === Ad overlays === */
  .ad-overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.92);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  .ad-overlay.active { display: flex; }
  .ad-box {
    width: 300px; height: 250px;
    background: rgba(30,30,50,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: rgba(255,255,255,0.3); font-size: 13px;
  }
  .ad-box .ad-label { font-size: 10px; color: rgba(255,255,255,0.2); margin-bottom: 8px; }
  .ad-skip { margin-top: 16px; font-size: 14px; color: rgba(255,255,255,0.4); cursor: pointer; }
  .ad-skip.ready { color: #fff; }
  .ad-timer { color: #ffee00; font-weight: 700; }
  .rewarded-box {
    width: 300px; height: 200px;
    background: rgba(30,30,50,0.95);
    border: 1px solid rgba(0,200,255,0.2);
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: rgba(255,255,255,0.5); font-size: 13px;
    text-align: center; padding: 20px;
  }
  .rewarded-progress {
    width: 200px; height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px; margin: 16px 0; overflow: hidden;
  }
  .rewarded-fill {
    height: 100%; background: linear-gradient(90deg, #00f0ff, #ff00e6);
    border-radius: 3px; transition: width 0.1s linear; width: 0;
  }

  /* === Misc === */
  .streak-popup {
    position: fixed; left: 50%; transform: translateX(-50%);
    top: 18%; font-size: clamp(20px, 5vw, 32px);
    font-weight: 900; color: #ffee00;
    text-shadow: 0 0 20px rgba(255,238,0,0.6);
    opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 25;
  }
  .streak-popup.show { opacity: 1; transform: translateX(-50%) translateY(-20px); }
  .coin-popup {
    position: fixed; pointer-events: none; z-index: 40;
    font-size: 18px; font-weight: 700; color: #ffee00;
    text-shadow: 0 0 8px rgba(255,238,0,0.5);
    transition: all 0.6s ease-out; opacity: 1;
  }
  .coin-popup.fade { opacity: 0; transform: translateY(-30px); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- HUD -->
<div id="score-display">0</div>
<div id="coin-hud"><span class="coin-icon"></span> <span id="coin-count">0</span></div>
<div id="streak-popup" class="streak-popup"></div>

<!-- MENU -->
<div id="menu-overlay" class="overlay active">
  <div class="menu-title">FLAPPY NEON</div>
  <div class="menu-sub">Dotknij, aby zagrać</div>
  <div class="menu-buttons">
    <button class="btn btn-primary" id="btn-play">▶ GRAJ</button>
    <button class="btn" id="btn-shop">🛒 SKLEP</button>
    <div style="position:relative;display:inline-block">
      <button class="btn btn-gold btn-small" id="btn-daily">🎁 Bonus dzienny</button>
      <span class="daily-badge" id="daily-badge" style="display:none">!</span>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div id="go-overlay" class="overlay">
  <div class="panel" id="go-panel">
    <h2 style="color:#ff4466">GAME OVER</h2>
    <div id="medal-display" class="medal"></div>
    <div class="stat-row">
      <span class="stat-label">Wynik</span>
      <span class="stat-value" id="final-score">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Najlepszy</span>
      <span class="stat-value" id="best-score">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Monety</span>
      <span class="stat-value coins-earned" id="coins-earned">+0</span>
    </div>
    <div class="go-buttons">
      <button class="btn btn-gold btn-small" id="btn-revive" style="display:none">💖 Wskrześ (50 🪙)</button>
      <button class="btn btn-small" id="btn-revive-ad" style="display:none">📺 Wskrześ (reklama)</button>
      <button class="btn btn-primary btn-small" id="btn-restart">🔄 Jeszcze raz</button>
    </div>
  </div>
</div>

<!-- SHOP -->
<div id="shop-overlay" class="overlay">
  <div class="panel" id="shop-panel" style="max-width:380px">
    <h2 style="color:#00f0ff">🛒 SKLEP</h2>
    <div style="color:#ffee00;font-size:14px;margin-bottom:8px">🪙 <span id="shop-coins">0</span> monet</div>
    <div class="shop-grid" id="shop-grid"></div>
    <button class="btn btn-small" id="btn-shop-close" style="margin-top:12px">Zamknij</button>
  </div>
</div>

<!-- DAILY BONUS -->
<div id="daily-overlay" class="overlay">
  <div class="panel" id="daily-panel">
    <h2 style="color:#ffee00">🎁 BONUS DZIENNY</h2>
    <div id="daily-content"></div>
    <button class="btn btn-small" id="btn-daily-close" style="margin-top:16px">OK</button>
  </div>
</div>

<!-- INTERSTITIAL AD -->
<div id="ad-interstitial" class="ad-overlay">
  <div class="ad-box" id="ad-interstitial-slot">
    <div class="ad-label">REKLAMA</div>
    <!-- AdSense display ad (web) — zamieni się automatycznie -->
    <ins class="adsbygoogle" style="display:block;width:300px;height:250px" data-ad-client="ca-pub-XXXX" data-ad-slot="INTERSTITIAL_SLOT_ID" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>
  <div class="ad-skip" id="ad-skip">Pomiń za <span class="ad-timer" id="ad-timer">5</span>s</div>
</div>

<!-- REWARDED AD -->
<div id="ad-rewarded" class="ad-overlay">
  <div class="rewarded-box">
    <div class="ad-label">REKLAMA Z NAGRODĄ</div>
    <div style="font-size:32px;margin:8px 0">🎬</div>
    <div id="rewarded-status">Ładowanie reklamy...</div>
    <div class="rewarded-progress"><div class="rewarded-fill" id="rewarded-fill"></div></div>
    <div style="font-size:11px;color:rgba(255,255,255,0.3)" id="rewarded-hint">Oglądaj do końca aby otrzymać nagrodę</div>
  </div>
</div>

<script>
(() => {
  "use strict";

  // =============================================
  //  PERSISTENCE
  // =============================================
  const STORAGE = {
    get(key, fallback) {
      try { const v = localStorage.getItem("fn_" + key); return v !== null ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    },
    set(key, val) { try { localStorage.setItem("fn_" + key, JSON.stringify(val)); } catch {} }
  };

  // =============================================
  //  SKINS
  // =============================================
  const SKINS = [
    { id: "neon",    name: "Neon",      price: 0,    body: "#00d4ff", glow: "#00f0ff", wing: "#0090cc", beak: "#ffaa00" },
    { id: "fire",    name: "Ognisty",   price: 100,  body: "#ff5533", glow: "#ff4400", wing: "#cc3300", beak: "#ffee00" },
    { id: "toxic",   name: "Toksyczny", price: 150,  body: "#44ff44", glow: "#00ff44", wing: "#22aa22", beak: "#ffaa00" },
    { id: "sunset",  name: "Zachód",    price: 200,  body: "#ff8844", glow: "#ff6600", wing: "#cc5500", beak: "#ffee00" },
    { id: "purple",  name: "Ultra",     price: 300,  body: "#bb44ff", glow: "#aa00ff", wing: "#8822cc", beak: "#ff88ff" },
    { id: "golden",  name: "Złoty",     price: 500,  body: "#ffd700", glow: "#ffaa00", wing: "#cc9900", beak: "#ff6600" },
    { id: "rainbow", name: "Tęcza",     price: 1000, body: "rainbow", glow: "#ff00e6", wing: "#8822cc", beak: "#ffee00" },
    { id: "ghost",   name: "Duch",      price: 750,  body: "rgba(200,200,255,0.5)", glow: "rgba(200,200,255,0.3)", wing: "rgba(150,150,220,0.4)", beak: "rgba(255,200,100,0.6)" },
    { id: "matrix",  name: "Matrix",    price: 400,  body: "#00ff41", glow: "#00ff41", wing: "#008f11", beak: "#00ff41" },
  ];

  // =============================================
  //  STATE
  // =============================================
  let coins = STORAGE.get("coins", 0);
  let bestScore = STORAGE.get("best", 0);
  let ownedSkins = STORAGE.get("owned", ["neon"]);
  let equippedSkin = STORAGE.get("skin", "neon");
  let totalGames = STORAGE.get("games", 0);
  let deathsSinceAd = STORAGE.get("deaths_ad", 0);
  let lastDaily = STORAGE.get("daily_ts", 0);
  let dailyStreak = STORAGE.get("daily_streak", 0);

  const STATE = { MENU: 0, PLAYING: 1, DYING: 2, DEAD: 3 };
  let state = STATE.MENU;
  let score = 0, sessionCoins = 0, reviveUsed = false;

  const BIRD_SIZE = 22, GRAVITY = 0.65, FLAP_POWER = -10;
  const PIPE_WIDTH = 52, PIPE_GAP_START = 240, PIPE_GAP_MIN = 175;
  const PIPE_SPEED_START = 3.5, PIPE_SPEED_MAX = 6, PIPE_SPACING = 230;
  const GROUND_HEIGHT = 70, AD_EVERY_N_DEATHS = 3, REVIVE_COST = 50;
  const TICK_MS = 1000 / 60; // fixed 60 ticks/s
  let lastTime = 0, accumulator = 0;

  let bird = { x:0, y:0, vy:0, angle:0, wingPhase:0, trail:[] };
  let pipes = [], pipeTimer = 0;
  let gameSpeed = PIPE_SPEED_START, pipeGap = PIPE_GAP_START;
  let groundX = 0, shakeX = 0, shakeY = 0, shakeMag = 0, flash = 0;
  let starParticles = [], particles = [];
  const streakMilestones = [5,10,15,20,25,30,40,50,75,100];
  let streakTimer = 0;

  // =============================================
  //  CANVAS
  // =============================================
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  let W, H;
  function resize() {
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*dpr; canvas.height = H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  window.addEventListener("resize", resize);

  // =============================================
  //  AUDIO
  // =============================================
  let audioCtx;
  function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    if (type==="flap") {
      osc.type="sine"; osc.frequency.setValueAtTime(400,t);
      osc.frequency.exponentialRampToValueAtTime(600,t+0.08);
      gain.gain.setValueAtTime(0.12,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      osc.start(t); osc.stop(t+0.12);
    } else if (type==="score") {
      osc.type="square"; osc.frequency.setValueAtTime(520,t);
      osc.frequency.setValueAtTime(680,t+0.06); osc.frequency.setValueAtTime(880,t+0.12);
      gain.gain.setValueAtTime(0.08,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      osc.start(t); osc.stop(t+0.25);
    } else if (type==="hit") {
      osc.type="sawtooth"; osc.frequency.setValueAtTime(200,t);
      osc.frequency.exponentialRampToValueAtTime(50,t+0.3);
      gain.gain.setValueAtTime(0.15,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      osc.start(t); osc.stop(t+0.3);
    } else if (type==="milestone") {
      osc.type="sine"; osc.frequency.setValueAtTime(600,t);
      osc.frequency.setValueAtTime(800,t+0.08); osc.frequency.setValueAtTime(1000,t+0.16);
      osc.frequency.setValueAtTime(1200,t+0.24);
      gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      osc.start(t); osc.stop(t+0.4);
    } else if (type==="coin") {
      osc.type="sine"; osc.frequency.setValueAtTime(800,t);
      osc.frequency.setValueAtTime(1200,t+0.05);
      gain.gain.setValueAtTime(0.06,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      osc.start(t); osc.stop(t+0.1);
    } else if (type==="buy") {
      osc.type="sine"; osc.frequency.setValueAtTime(500,t);
      osc.frequency.setValueAtTime(700,t+0.1); osc.frequency.setValueAtTime(900,t+0.2);
      gain.gain.setValueAtTime(0.08,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      osc.start(t); osc.stop(t+0.3);
    } else if (type==="revive") {
      osc.type="sine"; osc.frequency.setValueAtTime(400,t);
      osc.frequency.setValueAtTime(600,t+0.15); osc.frequency.setValueAtTime(800,t+0.3);
      osc.frequency.setValueAtTime(1000,t+0.45);
      gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.start(t); osc.stop(t+0.5);
    }
  }

  // =============================================
  //  UI REFS
  // =============================================
  const scoreDisplay = document.getElementById("score-display");
  const coinCount = document.getElementById("coin-count");
  const streakPopup = document.getElementById("streak-popup");
  const menuOverlay = document.getElementById("menu-overlay");
  const goOverlay = document.getElementById("go-overlay");
  const goPanel = document.getElementById("go-panel");
  const shopOverlay = document.getElementById("shop-overlay");
  const shopPanel = document.getElementById("shop-panel");
  const dailyOverlay = document.getElementById("daily-overlay");
  const dailyPanel = document.getElementById("daily-panel");
  const adInterstitial = document.getElementById("ad-interstitial");
  const adRewarded = document.getElementById("ad-rewarded");

  function updateCoinHud() { coinCount.textContent = coins; }
  updateCoinHud();

  // =============================================
  //  DAILY BONUS
  // =============================================
  function canClaimDaily() { return (Date.now() - lastDaily) >= 86400000; }
  function updateDailyBadge() {
    document.getElementById("daily-badge").style.display = canClaimDaily() ? "inline" : "none";
  }
  function claimDaily() {
    if (!canClaimDaily()) {
      const next = new Date(lastDaily + 86400000);
      document.getElementById("daily-content").innerHTML =
        `<div style="font-size:14px;color:rgba(255,255,255,0.6);margin:12px 0">
          Już odebrano!<br>Następny bonus: <span style="color:#ffee00">${next.getHours().toString().padStart(2,"0")}:${next.getMinutes().toString().padStart(2,"0")}</span>
        </div>`;
    } else {
      if ((Date.now() - lastDaily) > 172800000) dailyStreak = 0;
      dailyStreak++;
      lastDaily = Date.now();
      const bonus = Math.min(dailyStreak * 10, 100);
      coins += bonus;
      STORAGE.set("coins", coins); STORAGE.set("daily_ts", lastDaily); STORAGE.set("daily_streak", dailyStreak);
      updateCoinHud();
      document.getElementById("daily-content").innerHTML =
        `<div style="font-size:48px;margin:8px 0">🪙</div>
         <div style="font-size:22px;color:#ffee00;font-weight:700">+${bonus} monet!</div>
         <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:8px">
           Seria: ${dailyStreak} ${dailyStreak===1?"dzień":"dni"} — wracaj codziennie!
         </div>`;
    }
    dailyOverlay.classList.add("active");
    setTimeout(() => dailyPanel.classList.add("show"), 50);
  }
  updateDailyBadge();

  // =============================================
  //  SHOP
  // =============================================
  function renderShop() {
    document.getElementById("shop-coins").textContent = coins;
    const grid = document.getElementById("shop-grid");
    grid.innerHTML = "";
    for (const s of SKINS) {
      const owned = ownedSkins.includes(s.id);
      const equipped = equippedSkin === s.id;
      const canBuy = coins >= s.price;
      const card = document.createElement("div");
      card.className = "skin-card" + (equipped?" equipped":owned?" owned":!canBuy?" locked":"");
      const bg = s.body === "rainbow" ? "conic-gradient(red,orange,yellow,green,cyan,blue,violet,red)" : s.body;
      card.innerHTML = `
        <div class="skin-preview" style="background:${bg};box-shadow:0 0 10px ${s.glow}"></div>
        <div class="skin-name">${s.name}</div>
        <div class="skin-price ${s.price===0?'free':''}">
          ${equipped?'✓ Noszony':owned?'Załóż':s.price===0?'Darmowy':s.price+' 🪙'}
        </div>`;
      card.addEventListener("click", () => {
        if (equipped) return;
        if (owned) {
          equippedSkin = s.id; STORAGE.set("skin", equippedSkin);
          playSound("buy"); renderShop(); return;
        }
        if (s.price === 0 || coins >= s.price) {
          coins -= s.price; ownedSkins.push(s.id); equippedSkin = s.id;
          STORAGE.set("coins",coins); STORAGE.set("owned",ownedSkins); STORAGE.set("skin",equippedSkin);
          updateCoinHud(); playSound("buy"); renderShop();
        }
      });
      grid.appendChild(card);
    }
  }

  // =============================================
  //  ADS — unified: AdMob (native) / AdSense (web)
  // =============================================
  const IS_NATIVE = typeof window.Capacitor !== 'undefined' && window.Capacitor.isNativePlatform();
  let admobPlugin = null;
  let admobReady = false;

  // ── AdMob IDs (zamień na swoje z https://admob.google.com) ──
  const ADMOB_INTERSTITIAL_ANDROID = 'ca-app-pub-XXXX/INTERSTITIAL_ANDROID';
  const ADMOB_INTERSTITIAL_IOS     = 'ca-app-pub-XXXX/INTERSTITIAL_IOS';
  const ADMOB_REWARDED_ANDROID     = 'ca-app-pub-XXXX/REWARDED_ANDROID';
  const ADMOB_REWARDED_IOS         = 'ca-app-pub-XXXX/REWARDED_IOS';

  // ── Test IDs (Google oficjalne — działają bez konta) ──
  const TEST_INTERSTITIAL_ANDROID = 'ca-app-pub-3940256099942544/1033173712';
  const TEST_INTERSTITIAL_IOS     = 'ca-app-pub-3940256099942544/4411468910';
  const TEST_REWARDED_ANDROID     = 'ca-app-pub-3940256099942544/5224354917';
  const TEST_REWARDED_IOS         = 'ca-app-pub-3940256099942544/1712485313';

  // Użyj TEST IDs dopóki nie wstawisz swoich:
  const USE_TEST_ADS = true;
  function getAdId(type) {
    const isIos = IS_NATIVE && window.Capacitor.getPlatform() === 'ios';
    if (USE_TEST_ADS) {
      return type === 'interstitial'
        ? (isIos ? TEST_INTERSTITIAL_IOS : TEST_INTERSTITIAL_ANDROID)
        : (isIos ? TEST_REWARDED_IOS : TEST_REWARDED_ANDROID);
    }
    return type === 'interstitial'
      ? (isIos ? ADMOB_INTERSTITIAL_IOS : ADMOB_INTERSTITIAL_ANDROID)
      : (isIos ? ADMOB_REWARDED_IOS : ADMOB_REWARDED_ANDROID);
  }

  // ── Init AdMob (native only) ──
  async function initAdMob() {
    if (!IS_NATIVE) return;
    try {
      const mod = await import('https://unpkg.com/@capacitor-community/admob@latest/dist/esm/index.js').catch(() => null);
      if (mod && mod.AdMob) {
        admobPlugin = mod.AdMob;
        await admobPlugin.initialize({ initializeForTesting: USE_TEST_ADS });
        admobReady = true;
        console.log('[AdMob] Initialized');
      }
    } catch(e) { console.warn('[AdMob] Init failed:', e); }
  }
  initAdMob();

  // ── Init AdSense ad slot (web only) ──
  function pushAdSense() {
    try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
  }

  // ── INTERSTITIAL ──
  function showInterstitialAd(onDone) {
    if (IS_NATIVE && admobReady) {
      showNativeInterstitial(onDone);
    } else {
      showWebInterstitial(onDone);
    }
  }

  async function showNativeInterstitial(onDone) {
    try {
      await admobPlugin.prepareInterstitial({ adId: getAdId('interstitial') });
      const handler = admobPlugin.addListener('onInterstitialAdDismissed', () => {
        handler.remove(); onDone();
      });
      await admobPlugin.showInterstitial();
    } catch(e) {
      console.warn('[AdMob] Interstitial failed:', e);
      onDone();
    }
  }

  function showWebInterstitial(onDone) {
    adInterstitial.classList.add("active");
    pushAdSense();
    let sec = 5;
    const skipEl = document.getElementById("ad-skip");
    skipEl.classList.remove("ready");
    skipEl.style.pointerEvents = "none";
    skipEl.innerHTML = 'Pomiń za <span class="ad-timer">' + sec + '</span>s';
    const iv = setInterval(() => {
      sec--;
      if (sec <= 0) {
        clearInterval(iv);
        skipEl.innerHTML = "Pomiń ✕";
        skipEl.classList.add("ready");
        skipEl.style.pointerEvents = "auto";
        skipEl.onclick = () => { adInterstitial.classList.remove("active"); skipEl.onclick=null; onDone(); };
      } else {
        skipEl.innerHTML = 'Pomiń za <span class="ad-timer">' + sec + '</span>s';
      }
    }, 1000);
  }

  // ── REWARDED ──
  function showRewardedAd(onReward) {
    if (IS_NATIVE && admobReady) {
      showNativeRewarded(onReward);
    } else {
      showWebRewarded(onReward);
    }
  }

  async function showNativeRewarded(onReward) {
    try {
      await admobPlugin.prepareRewardVideoAd({ adId: getAdId('rewarded') });
      const handler = admobPlugin.addListener('onRewardedVideoAdReward', () => {
        handler.remove(); onReward();
      });
      const dismiss = admobPlugin.addListener('onRewardedVideoAdDismissed', () => {
        dismiss.remove();
      });
      await admobPlugin.showRewardVideoAd();
    } catch(e) {
      console.warn('[AdMob] Rewarded failed, granting reward:', e);
      onReward();
    }
  }

  function showWebRewarded(onReward) {
    adRewarded.classList.add("active");
    const fill = document.getElementById("rewarded-fill");
    const status = document.getElementById("rewarded-status");
    status.textContent = "Oglądasz reklamę...";
    let progress = 0;
    const iv = setInterval(() => {
      progress += 2;
      fill.style.width = progress + "%";
      if (progress >= 100) {
        clearInterval(iv);
        status.textContent = "Nagroda odebrana!";
        setTimeout(() => { adRewarded.classList.remove("active"); fill.style.width="0"; onReward(); }, 300);
      }
    }, 60);
  }

  // =============================================
  //  STARS
  // =============================================
  function initStars() {
    starParticles = [];
    for (let i = 0; i < 80; i++)
      starParticles.push({ x:Math.random()*W, y:Math.random()*H, size:Math.random()*2+0.5, speed:Math.random()*0.3+0.1, flicker:Math.random()*Math.PI*2 });
  }
  initStars();

  // =============================================
  //  GAME LOGIC
  // =============================================
  function resetGame() {
    bird.x=W*0.22; bird.y=H*0.42; bird.vy=0; bird.angle=0; bird.wingPhase=0; bird.trail=[];
    pipes=[]; pipeTimer=PIPE_SPACING; score=0; sessionCoins=0; reviveUsed=false;
    gameSpeed=PIPE_SPEED_START; pipeGap=PIPE_GAP_START;
    groundX=0; shakeX=0; shakeY=0; shakeMag=0; flash=0; particles=[];
    scoreDisplay.textContent="0";
  }

  function spawnPipe() {
    const minY=80, maxY=H-GROUND_HEIGHT-pipeGap-80;
    pipes.push({ x:W+20, topH:minY+Math.random()*(maxY-minY), scored:false, glow:0 });
  }

  function burst(x,y,color,count) {
    for (let i=0;i<count;i++) {
      const a=Math.random()*Math.PI*2, sp=Math.random()*4+1;
      particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2, life:1, decay:0.015+Math.random()*0.02, size:Math.random()*4+2, color });
    }
  }

  function showCoinPopup(x,y,amount) {
    const el=document.createElement("div");
    el.className="coin-popup"; el.textContent=`+${amount} 🪙`;
    el.style.left=x+"px"; el.style.top=y+"px";
    document.body.appendChild(el);
    requestAnimationFrame(()=>el.classList.add("fade"));
    setTimeout(()=>el.remove(), 700);
  }

  function addCoins(n) { coins+=n; sessionCoins+=n; STORAGE.set("coins",coins); updateCoinHud(); }

  function checkCollision() {
    const bx=bird.x, by=bird.y, br=BIRD_SIZE*0.4;
    if (by+br>H-GROUND_HEIGHT||by-br<0) return true;
    for (const p of pipes)
      if (bx+br>p.x && bx-br<p.x+PIPE_WIDTH)
        if (by-br<p.topH || by+br>p.topH+pipeGap) return true;
    return false;
  }

  function showStreak(text) { streakPopup.textContent=text; streakPopup.classList.add("show"); streakTimer=60; }

  // =============================================
  //  REVIVE
  // =============================================
  function doRevive() {
    reviveUsed=true; state=STATE.PLAYING;
    bird.vy=FLAP_POWER; bird.y=Math.min(bird.y, H*0.4);
    shakeMag=0; flash=0;
    goOverlay.classList.remove("active"); goPanel.classList.remove("show");
    scoreDisplay.classList.add("visible");
    playSound("revive"); burst(bird.x, bird.y, "#00ff88", 20);
  }

  // =============================================
  //  GAME OVER
  // =============================================
  function showGameOver() {
    totalGames++; deathsSinceAd++;
    STORAGE.set("games",totalGames); STORAGE.set("deaths_ad",deathsSinceAd);
    const isNewBest = score > bestScore;
    if (isNewBest) { bestScore=score; STORAGE.set("best",bestScore); }
    let bonus=0;
    if (score>=50) bonus=10; else if(score>=30) bonus=5; else if(score>=10) bonus=2;
    if (bonus>0) addCoins(bonus);
    scoreDisplay.classList.remove("visible");

    const afterAd = () => {
      goOverlay.classList.add("active");
      document.getElementById("final-score").textContent=score;
      const bestEl=document.getElementById("best-score");
      bestEl.textContent=bestScore;
      bestEl.className="stat-value"+(isNewBest&&score>0?" new-best":"");
      document.getElementById("coins-earned").textContent=`+${sessionCoins} 🪙`;
      let medal="";
      if(score>=50)medal="👑"; else if(score>=30)medal="💎"; else if(score>=20)medal="🏆"; else if(score>=10)medal="🥇"; else if(score>=5)medal="🥈";
      document.getElementById("medal-display").textContent=medal;
      document.getElementById("btn-revive").style.display=(!reviveUsed&&coins>=REVIVE_COST)?"inline-block":"none";
      document.getElementById("btn-revive-ad").style.display=(!reviveUsed)?"inline-block":"none";
      setTimeout(()=>goPanel.classList.add("show"), 50);
    };

    if (deathsSinceAd >= AD_EVERY_N_DEATHS) {
      deathsSinceAd=0; STORAGE.set("deaths_ad",0);
      showInterstitialAd(afterAd);
    } else afterAd();
  }

  // =============================================
  //  INPUT
  // =============================================
  function flap() {
    initAudio();
    if (state===STATE.PLAYING) {
      bird.vy=FLAP_POWER; bird.wingPhase=0;
      playSound("flap"); burst(bird.x-8,bird.y+6,"rgba(0,240,255,0.6)",5);
    }
  }
  function startGame() {
    resetGame(); state=STATE.PLAYING;
    lastTime=0; accumulator=0;
    menuOverlay.classList.remove("active"); goOverlay.classList.remove("active"); goPanel.classList.remove("show");
    scoreDisplay.classList.add("visible"); bird.vy=FLAP_POWER; playSound("flap");
  }

  canvas.addEventListener("pointerdown", e => { e.preventDefault(); if(state===STATE.PLAYING) flap(); else if(state===STATE.MENU) startGame(); });
  document.addEventListener("keydown", e => {
    if(e.code==="Space"||e.code==="ArrowUp") { e.preventDefault(); if(state===STATE.PLAYING) flap(); else if(state===STATE.MENU) startGame(); }
  });

  document.getElementById("btn-play").addEventListener("click", e => { e.stopPropagation(); startGame(); });
  document.getElementById("btn-shop").addEventListener("click", e => {
    e.stopPropagation(); renderShop(); shopOverlay.classList.add("active");

  document.getElementById("btn-shop-close").addEventListener("click", () => {
    shopPanel.classList.remove("show"); setTimeout(()=>shopOverlay.classList.remove("active"), 300);
  });

  document.getElementById("btn-daily-close").addEventListener("click", () => {
    dailyPanel.classList.remove("show"); setTimeout(()=>dailyOverlay.classList.remove("active"), 300);
    updateDailyBadge();

  // =============================================
  //  UPDATE
  // =============================================
  function update() {
    for (const s of starParticles) {
      s.flicker+=0.03;
      if(state===STATE.PLAYING) s.x-=s.speed*gameSpeed*0.3;
      if(s.x<0){ s.x=W; s.y=Math.random()*H; }
    }
    if(streakTimer>0){ streakTimer--; if(streakTimer===0)streakPopup.classList.remove("show"); }

    if (state===STATE.MENU) {
      bird.x=W*0.22; bird.y=H*0.42+Math.sin(Date.now()/400)*12;
      bird.angle=Math.sin(Date.now()/500)*0.1; bird.wingPhase+=0.15; return;
    }
    if (state===STATE.PLAYING) {
      bird.vy+=GRAVITY; bird.y+=bird.vy;
      bird.angle=Math.max(-0.5,Math.min(bird.vy*0.06,1.2));
      bird.wingPhase+=bird.vy<0?0.4:0.12;
      bird.trail.push({x:bird.x,y:bird.y,life:1});
      if(bird.trail.length>12)bird.trail.shift();
      for(const t of bird.trail) t.life-=0.08;
      groundX-=gameSpeed; if(groundX<-40) groundX+=40;
      pipeTimer-=gameSpeed; if(pipeTimer<=0){ spawnPipe(); pipeTimer=PIPE_SPACING; }

      for(let i=pipes.length-1;i>=0;i--) {
        pipes[i].x-=gameSpeed;
        if(pipes[i].glow>0) pipes[i].glow-=0.03;
        if(!pipes[i].scored && pipes[i].x+PIPE_WIDTH<bird.x) {
          pipes[i].scored=true; pipes[i].glow=1; score++;
          scoreDisplay.textContent=score;
          const coinAmt=(score%10===0)?5:1;
          addCoins(coinAmt); playSound("coin");
          showCoinPopup(bird.x+30, bird.y-20, coinAmt);
          if(streakMilestones.includes(score)) { playSound("milestone"); showStreak(`🔥 ${score}!`); burst(W/2,H*0.3,"#ffee00",20); }
          else playSound("score");
          gameSpeed=Math.min(PIPE_SPEED_MAX, PIPE_SPEED_START+score*0.025);
          pipeGap=Math.max(PIPE_GAP_MIN, PIPE_GAP_START-score*0.5);
        }
        if(pipes[i].x+PIPE_WIDTH<-10) pipes.splice(i,1);
      }
      if(checkCollision()) {
        state=STATE.DYING; playSound("hit"); shakeMag=12; flash=1;
        burst(bird.x,bird.y,"#ff4466",25); burst(bird.x,bird.y,"#ffee00",10);
      }
    }
    if (state===STATE.DYING) {
      bird.vy+=GRAVITY*0.8; bird.y+=bird.vy; bird.angle+=0.15;
      shakeMag*=0.9; shakeX=(Math.random()-0.5)*shakeMag; shakeY=(Math.random()-0.5)*shakeMag;
      flash*=0.85;
      if(bird.y>H-GROUND_HEIGHT+20){ state=STATE.DEAD; showGameOver(); }
    }
    for(let i=particles.length-1;i>=0;i--) {
      const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay;
      if(p.life<=0) particles.splice(i,1);
    }
  }

  // =============================================
  //  DRAWING
  // =============================================
  function drawBackground() {
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,"#0a0a2e"); grad.addColorStop(0.5,"#141440");
    grad.addColorStop(0.85,"#1a1a50"); grad.addColorStop(1,"#0d0d30");
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    for(const s of starParticles) {
      ctx.globalAlpha=0.3+Math.sin(s.flicker)*0.3; ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.fillStyle="rgba(20,20,60,0.6)";
    const cityY=H-GROUND_HEIGHT-60;
    for(let x=0;x<W;x+=30+Math.sin(x*0.1)*15) {
      const h=20+Math.abs(Math.sin(x*0.05))*60;
      ctx.fillRect(x,cityY+60-h,18+Math.sin(x)*8,h);
    }
  }

  function drawPipe(p) {
    const topH=p.topH, botY=topH+pipeGap;
    if(p.glow>0){ ctx.shadowColor="#00f0ff"; ctx.shadowBlur=20*p.glow; }
    const pg=ctx.createLinearGradient(p.x,0,p.x+PIPE_WIDTH,0);
    pg.addColorStop(0,"#1a3a4a"); pg.addColorStop(0.3,"#0d4a5a"); pg.addColorStop(0.7,"#0d4a5a"); pg.addColorStop(1,"#1a3a4a");
    ctx.fillStyle=pg; ctx.fillRect(p.x,0,PIPE_WIDTH,topH);
    ctx.fillStyle="#00c8ff"; ctx.fillRect(p.x-4,topH-20,PIPE_WIDTH+8,20);
    ctx.fillStyle="rgba(0,240,255,0.3)"; ctx.fillRect(p.x-4,topH-20,PIPE_WIDTH+8,3);
    ctx.fillStyle=pg; ctx.fillRect(p.x,botY,PIPE_WIDTH,H-botY-GROUND_HEIGHT);
    ctx.fillStyle="#00c8ff"; ctx.fillRect(p.x-4,botY,PIPE_WIDTH+8,20);
    ctx.fillStyle="rgba(0,240,255,0.3)"; ctx.fillRect(p.x-4,botY+17,PIPE_WIDTH+8,3);
    ctx.strokeStyle="rgba(0,240,255,0.4)"; ctx.lineWidth=1;
    ctx.strokeRect(p.x+2,0,PIPE_WIDTH-4,topH-20);
    ctx.strokeRect(p.x+2,botY+20,PIPE_WIDTH-4,H-botY-GROUND_HEIGHT-20);
    ctx.shadowColor="transparent"; ctx.shadowBlur=0;
    // Floating coin
    if(!p.scored) {
      const cx=p.x+PIPE_WIDTH/2, cy=topH+pipeGap/2, wobble=Math.sin(Date.now()/300+p.x)*3;
      ctx.save(); ctx.shadowColor="#ffee00"; ctx.shadowBlur=10;
      ctx.fillStyle="#ffee00"; ctx.beginPath(); ctx.arc(cx,cy+wobble,8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#ffaa00"; ctx.beginPath(); ctx.arc(cx,cy+wobble,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#ffee00"; ctx.font="bold 8px sans-serif"; ctx.textAlign="center";
      ctx.fillText("$",cx,cy+wobble+3); ctx.restore();
    }
  }

  function drawGround() {
    const gy=H-GROUND_HEIGHT;
    const gGrad=ctx.createLinearGradient(0,gy,0,H);
    gGrad.addColorStop(0,"#2a1a3a"); gGrad.addColorStop(0.1,"#1a1030"); gGrad.addColorStop(1,"#0a0818");
    ctx.fillStyle=gGrad; ctx.fillRect(0,gy,W,GROUND_HEIGHT);
    ctx.strokeStyle="#ff00e6"; ctx.lineWidth=2; ctx.shadowColor="#ff00e6"; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); ctx.shadowBlur=0;
    ctx.strokeStyle="rgba(255,0,230,0.15)"; ctx.lineWidth=1;
    for(let x=groundX;x<W;x+=40){ ctx.beginPath(); ctx.moveTo(x,gy+5); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=gy+20;y<H;y+=20){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }

  function getSkinColors() {
    const s=SKINS.find(sk=>sk.id===equippedSkin)||SKINS[0];
    if(s.body==="rainbow") {
      const hue=(Date.now()/10)%360;
      return { body:`hsl(${hue},100%,60%)`, glow:`hsl(${hue},100%,50%)`, wing:`hsl(${(hue+120)%360},80%,40%)`, beak:s.beak };
    }
    return { body:s.body, glow:s.glow, wing:s.wing, beak:s.beak };
  }

  function drawBird() {
    const sk=getSkinColors();
    ctx.save(); ctx.translate(bird.x,bird.y); ctx.rotate(bird.angle);
    for(const t of bird.trail) {
      if(t.life<=0) continue;
      ctx.globalAlpha=t.life*0.3; ctx.fillStyle=sk.glow;
      ctx.beginPath(); ctx.arc(t.x-bird.x,t.y-bird.y,4*t.life,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowColor=sk.glow; ctx.shadowBlur=15;
    ctx.fillStyle=sk.body;
    ctx.beginPath(); ctx.ellipse(0,0,BIRD_SIZE*0.55,BIRD_SIZE*0.42,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.25)";
    ctx.beginPath(); ctx.ellipse(-3,-5,BIRD_SIZE*0.3,BIRD_SIZE*0.18,-0.3,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    const wingY=Math.sin(bird.wingPhase)*6;
    ctx.fillStyle=sk.wing;
    ctx.beginPath(); ctx.ellipse(-4,wingY+2,10,5,-0.2+wingY*0.03,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(8,-4,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#111"; ctx.beginPath(); ctx.arc(9.5,-3.5,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(10.5,-5,1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=sk.beak;
    ctx.beginPath(); ctx.moveTo(13,-1); ctx.lineTo(20,2); ctx.lineTo(13,5); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawParticles() {
    for(const p of particles) {
      ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  function drawFlash() {
    if(flash>0.01){ ctx.fillStyle=`rgba(255,68,102,${flash*0.3})`; ctx.fillRect(0,0,W,H); }
  }

  // =============================================
  //  GAME LOOP (fixed timestep — 60 ticks/s)
  // =============================================
  function frame(now) {
    if (!lastTime) lastTime = now;
    const dt = Math.min(now - lastTime, 100); // cap at 100ms to avoid spiral
    lastTime = now;
    accumulator += dt;
    while (accumulator >= TICK_MS) {
      update();
      accumulator -= TICK_MS;
    }
    ctx.save();
    if(shakeMag>0.5) ctx.translate(shakeX,shakeY);
    drawBackground();
    for(const p of pipes) drawPipe(p);
    drawGround(); drawBird(); drawParticles(); drawFlash();
    ctx.restore();
    requestAnimationFrame(frame);
  }

  resetGame(); requestAnimationFrame(frame);

  // PWA
  if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(()=>{});
})();
</script>
</body>
