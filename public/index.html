<!DOCTYPE html>
<html lang="pl">
<head>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a1a;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #fx-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; mix-blend-mode: screen; opacity: 0; transition: opacity 0.2s; }
  #fx-canvas.active { opacity: 1; }
  #vignette {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 11;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  }
  #scanlines {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 12; opacity: 0.04;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);
  }
  #bass-pulse {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 13;
    border: 0px solid transparent; box-sizing: border-box;
    transition: border-width 0.05s, border-color 0.05s;
  }
  #bass-pulse.hit { border: 8px solid rgba(255,0,100,0.4); }
  #bass-pulse.combo { border: 6px solid rgba(255,0,230,0.3); }
  #bass-pulse.drift { border: 5px solid rgba(0,255,170,0.3); }

  /* === HUD === */
  #score-display {
    position: fixed; top: max(env(safe-area-inset-top), 20px);
    left: 50%; transform: translateX(-50%);
    font-size: clamp(32px, 7vw, 56px);
    font-weight: 900; color: #fff;
    text-shadow: 0 0 10px rgba(0,240,255,0.8), 0 2px 4px rgba(0,0,0,0.5);
    z-index: 20; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  #score-display.visible { opacity: 1; }
  #coin-hud {
    position: fixed; top: max(env(safe-area-inset-top), 20px); right: 16px;
    font-size: 16px; font-weight: 700; color: #ffee00;
    text-shadow: 0 0 8px rgba(255,238,0,0.5);
    z-index: 20; pointer-events: none;
    display: flex; align-items: center; gap: 4px;
  }
  #coin-hud .coin-icon {
    width: 20px; height: 20px;
    background: radial-gradient(circle, #ffee00 40%, #ff9900);
    border-radius: 50%;
    border: 2px solid #ffaa00;
    display: inline-block;
  }

  /* === Overlays === */
  .overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 30;
  }
  .overlay.active { display: flex; }

  /* === Menu === */
  .menu-title {
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 900;
    background: linear-gradient(135deg, #00f0ff, #ff00e6, #ffee00);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(0,240,255,0.5));
    margin-bottom: 8px; letter-spacing: -2px;
  }
  .menu-sub {
    color: rgba(255,255,255,0.5); font-size: clamp(13px, 3vw, 18px);
    margin-bottom: 32px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .menu-buttons { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    color: #fff; font-size: 16px; font-weight: 600;
    padding: 14px 40px; cursor: pointer;
    transition: all 0.2s;
    min-width: 200px; text-align: center;
    backdrop-filter: blur(10px);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); background: rgba(255,255,255,0.12); }
  .btn-primary { background: rgba(0,200,255,0.15); border-color: rgba(0,200,255,0.4); color: #00e0ff; }
  .btn-gold { background: rgba(255,200,0,0.12); border-color: rgba(255,200,0,0.35); color: #ffee00; }
  .btn-small { font-size: 13px; padding: 10px 24px; min-width: auto; }

  .daily-badge {
    position: absolute; top: -6px; right: -6px;
    background: #ff4466; color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 8px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  /* === Panels === */
  .panel {
    background: rgba(10,10,30,0.94);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 28px 36px;
    text-align: center; backdrop-filter: blur(20px);
    transform: scale(0.8); opacity: 0;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 340px; width: 90vw;
  }
  .panel.show { transform: scale(1); opacity: 1; }
  .panel h2 { font-size: clamp(22px, 5vw, 32px); margin-bottom: 12px; }
  .stat-row {
    display: flex; justify-content: space-between;
    padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .stat-label { color: rgba(255,255,255,0.5); font-size: 13px; }
  .stat-value { color: #fff; font-weight: 700; font-size: 16px; }
  .stat-value.new-best { color: #ffee00; }
  .medal { font-size: 44px; margin: 8px 0; filter: drop-shadow(0 0 12px rgba(255,200,0,0.6)); }
  .coins-earned { color: #ffee00; font-weight: 700; font-size: 18px; margin: 8px 0; }
  .go-buttons { display: flex; gap: 10px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }

  /* === Shop === */
  .shop-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin: 16px 0; max-height: 50vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .skin-card {
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 12px 8px;
    text-align: center; cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .skin-card:active { transform: scale(0.95); }
  .skin-card.owned { border-color: rgba(0,200,255,0.3); }
  .skin-card.equipped { border-color: #00f0ff; background: rgba(0,200,255,0.1); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
  .skin-card.locked { opacity: 0.5; }
  .skin-preview { width: 42px; height: 42px; margin: 0 auto 6px; border-radius: 50%; }
  .skin-name { font-size: 11px; font-weight: 600; color: #fff; margin-bottom: 3px; }
  .skin-price { font-size: 11px; color: #ffee00; font-weight: 600; }
  .skin-price.free { color: #00ff88; }

  /* === Ad overlays === */
  .ad-overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.92);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  .ad-overlay.active { display: flex; }
  .ad-box {
    width: 300px; height: 250px;
    background: rgba(30,30,50,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: rgba(255,255,255,0.3); font-size: 13px;
  }
  .ad-box .ad-label { font-size: 10px; color: rgba(255,255,255,0.2); margin-bottom: 8px; }
  .ad-skip { margin-top: 16px; font-size: 14px; color: rgba(255,255,255,0.4); cursor: pointer; }
  .ad-skip.ready { color: #fff; }
  .ad-timer { color: #ffee00; font-weight: 700; }
  .rewarded-box {
    width: 300px; height: 200px;
    background: rgba(30,30,50,0.95);
    border: 1px solid rgba(0,200,255,0.2);
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: rgba(255,255,255,0.5); font-size: 13px;
    text-align: center; padding: 20px;
  }
  .rewarded-progress {
    width: 200px; height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px; margin: 16px 0; overflow: hidden;
  }
  .rewarded-fill {
    height: 100%; background: linear-gradient(90deg, #00f0ff, #ff00e6);
    border-radius: 3px; transition: width 0.1s linear; width: 0;
  }

  /* === Misc === */
  .streak-popup {
    position: fixed; left: 50%; transform: translateX(-50%);
    top: 18%; font-size: clamp(20px, 5vw, 32px);
    font-weight: 900; color: #ffee00;
    text-shadow: 0 0 20px rgba(255,238,0,0.6);
    opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 25;
  }
  .streak-popup.show { opacity: 1; transform: translateX(-50%) translateY(-20px); }
  .coin-popup {
    position: fixed; pointer-events: none; z-index: 40;
    font-size: 18px; font-weight: 700; color: #ffee00;
    text-shadow: 0 0 8px rgba(255,238,0,0.5);
    transition: all 0.6s ease-out; opacity: 1;
  }
  .coin-popup.fade { opacity: 0; transform: translateY(-30px); }
  /* === Combo HUD === */
  #combo-hud {
    position: fixed; top: max(env(safe-area-inset-top), 20px); left: 16px;
    font-size: 14px; font-weight: 800; color: #ff00e6;
    text-shadow: 0 0 10px rgba(255,0,230,0.6);
    z-index: 20; pointer-events: none; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
  }
  #combo-hud.visible { opacity: 1; }
  #combo-hud.bump { transform: scale(1.3); }
  #combo-bar {
    width: 60px; height: 4px; background: rgba(255,255,255,0.1);
    border-radius: 2px; margin-top: 3px; overflow: hidden;
  }
  #combo-fill { height: 100%; background: linear-gradient(90deg,#ff00e6,#ffee00); border-radius: 2px; width: 0; transition: width 0.15s; }
  /* === Power-up HUD === */
  #powerup-hud {
    position: fixed; bottom: max(env(safe-area-inset-bottom),80px); left: 50%; transform: translateX(-50%);
    font-size: 14px; font-weight: 700; color: #00ff88;
    text-shadow: 0 0 10px rgba(0,255,136,0.5);
    z-index: 20; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  #powerup-hud.visible { opacity: 1; }
  /* === Achievement toast === */
  #achievement-toast {
    position: fixed; top: 15%; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: rgba(10,10,40,0.95); border: 1px solid rgba(255,200,0,0.4);
    border-radius: 12px; padding: 10px 20px;
    color: #ffee00; font-weight: 700; font-size: 14px;
    text-shadow: 0 0 8px rgba(255,238,0,0.4);
    z-index: 50; pointer-events: none;
    opacity: 0; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(10px); white-space: nowrap;
  }
  #achievement-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  /* === Zone banner === */
  #zone-banner {
    position: fixed; top: 30%; left: 50%; transform: translateX(-50%) scale(0.5);
    font-size: clamp(24px,6vw,42px); font-weight: 900;
    letter-spacing: 3px; z-index: 22; pointer-events: none;
    opacity: 0; transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  #zone-banner.show { opacity: 1; transform: translateX(-50%) scale(1); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>

<canvas id="game"></canvas>
<canvas id="fx-canvas"></canvas>
<div id="vignette"></div>
<div id="scanlines"></div>
<div id="bass-pulse"></div>

<!-- HUD -->
<div id="score-display">0</div>
<div id="coin-hud"><span class="coin-icon"></span> <span id="coin-count">0</span></div>
<div id="mute-btn" style="position:fixed;top:max(env(safe-area-inset-top),20px);right:16px;z-index:20;font-size:1.3rem;cursor:pointer;opacity:0.5;user-select:none" title="M = mute">🔊</div>
<div id="streak-popup" class="streak-popup"></div>
<div id="combo-hud"><span id="combo-text">x1</span><div id="combo-bar"><div id="combo-fill"></div></div></div>
<div id="powerup-hud" id="powerup-hud"></div>
<div id="achievement-toast"></div>
<div id="zone-banner"></div>

<!-- PAUSE -->
<div id="pause-overlay" class="overlay">
  <div class="menu-title" style="font-size:2rem">⏸ PAUZA</div>
  <div class="menu-sub">ESC lub Space — kontynuuj</div>
  <button class="btn btn-primary" id="btn-resume">▶ KONTYNUUJ</button>
</div>

<!-- MENU -->
<div id="menu-overlay" class="overlay active">
  <div class="menu-title">NEON DRIFT</div>
  <div class="menu-sub">Przytrzymaj ▲ Puść ▼</div>
  <div class="menu-buttons">
    <button class="btn btn-primary" id="btn-play">▶ GRAJ</button>
    <button class="btn" id="btn-shop">🛒 SKLEP</button>
    <div style="position:relative;display:inline-block">
      <button class="btn btn-gold btn-small" id="btn-daily">🎁 Bonus dzienny</button>
      <span class="daily-badge" id="daily-badge" style="display:none">!</span>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div id="go-overlay" class="overlay">
  <div class="panel" id="go-panel">
    <h2 style="color:#ff4466">GAME OVER</h2>
    <div id="medal-display" class="medal"></div>
    <div class="stat-row">
      <span class="stat-label">Wynik</span>
      <span class="stat-value" id="final-score">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Najlepszy</span>
      <span class="stat-value" id="best-score">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Monety</span>
      <span class="stat-value coins-earned" id="coins-earned">+0</span>
    </div>
    <div id="go-taunt" style="color:rgba(255,255,255,0.35);font-size:12px;margin:6px 0;font-style:italic"></div>
    <div class="go-buttons">
      <button class="btn btn-gold btn-small" id="btn-revive" style="display:none"></button>
      <button class="btn btn-small" id="btn-revive-ad" style="display:none"></button>
      <button class="btn btn-primary btn-small" id="btn-restart">🔄 Jeszcze raz</button>
      <button class="btn btn-small" id="btn-share" style="font-size:12px">📤 Udostępnij</button>
    </div>
  </div>
</div>

<!-- SHOP -->
<div id="shop-overlay" class="overlay">
  <div class="panel" id="shop-panel" style="max-width:380px">
    <h2 style="color:#00f0ff">🛒 SKLEP</h2>
    <div style="color:#ffee00;font-size:14px;margin-bottom:8px">🪙 <span id="shop-coins">0</span> monet</div>
    <div class="shop-grid" id="shop-grid"></div>
    <button class="btn btn-small" id="btn-shop-close" style="margin-top:12px">Zamknij</button>
  </div>
</div>

<!-- DAILY BONUS -->
<div id="daily-overlay" class="overlay">
  <div class="panel" id="daily-panel">
    <h2 style="color:#ffee00">🎁 BONUS DZIENNY</h2>
    <div id="daily-content"></div>
    <button class="btn btn-small" id="btn-daily-close" style="margin-top:16px">OK</button>
  </div>
</div>

<!-- INTERSTITIAL AD -->
<div id="ad-interstitial" class="ad-overlay">
  <div class="ad-box" id="ad-interstitial-slot">
    <div class="ad-label">REKLAMA</div>
    <!-- AdSense display ad (web) — zamieni się automatycznie -->
    <ins class="adsbygoogle" style="display:block;width:300px;height:250px" data-ad-client="ca-pub-8654195531699282" data-ad-slot="INTERSTITIAL_SLOT_ID" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>
  <div class="ad-skip" id="ad-skip">Pomiń za <span class="ad-timer" id="ad-timer">5</span>s</div>
</div>

<!-- REWARDED AD -->
<div id="ad-rewarded" class="ad-overlay">
  <div class="rewarded-box">
    <div class="ad-label">REKLAMA Z NAGRODĄ</div>
    <div style="font-size:32px;margin:8px 0">🎬</div>
    <div id="rewarded-status">Ładowanie reklamy...</div>
    <div class="rewarded-progress"><div class="rewarded-fill" id="rewarded-fill"></div></div>
    <div style="font-size:11px;color:rgba(255,255,255,0.3)" id="rewarded-hint">Oglądaj do końca aby otrzymać nagrodę</div>
  </div>
</div>

<script>
(() => {
  "use strict";

  // =============================================
  //  PERSISTENCE
  // =============================================
  const STORAGE = {
    get(key, fallback) {
      try { const v = localStorage.getItem("fn_" + key); return v !== null ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    },
    set(key, val) { try { localStorage.setItem("fn_" + key, JSON.stringify(val)); } catch {} }
  };

  // =============================================
  //  SKINS
  // =============================================
  const SKINS = [
    { id: "neon",    name: "Cyan",      price: 0,    body: "#00d4ff", glow: "#00f0ff", ring: "#0090cc", thrust: "#00aaff" },
    { id: "fire",    name: "Plasma",    price: 100,  body: "#ff5533", glow: "#ff4400", ring: "#cc3300", thrust: "#ffaa00" },
    { id: "toxic",   name: "Acid",      price: 150,  body: "#44ff44", glow: "#00ff44", ring: "#22aa22", thrust: "#88ff88" },
    { id: "sunset",  name: "Solar",     price: 200,  body: "#ff8844", glow: "#ff6600", ring: "#cc5500", thrust: "#ffcc44" },
    { id: "purple",  name: "Void",      price: 300,  body: "#bb44ff", glow: "#aa00ff", ring: "#8822cc", thrust: "#dd88ff" },
    { id: "golden",  name: "Aurum",     price: 500,  body: "#ffd700", glow: "#ffaa00", ring: "#cc9900", thrust: "#ffee88" },
    { id: "rainbow", name: "Prism",     price: 1000, body: "rainbow", glow: "#ff00e6", ring: "#8822cc", thrust: "#ffffff" },
    { id: "ghost",   name: "Phantom",   price: 750,  body: "rgba(200,200,255,0.5)", glow: "rgba(200,200,255,0.3)", ring: "rgba(150,150,220,0.4)", thrust: "rgba(180,180,255,0.5)" },
    { id: "matrix",  name: "Glitch",    price: 400,  body: "#00ff41", glow: "#00ff41", ring: "#008f11", thrust: "#00ff41" },
  ];

  // =============================================
  //  STATE
  // =============================================
  let coins = STORAGE.get("coins", 0);
  let bestScore = STORAGE.get("best", 0);
  let ownedSkins = STORAGE.get("owned", ["neon"]);
  let equippedSkin = STORAGE.get("skin", "neon");
  let totalGames = STORAGE.get("games", 0);
  let deathsSinceAd = STORAGE.get("deaths_ad", 0);
  let lastDaily = STORAGE.get("daily_ts", 0);
  let dailyStreak = STORAGE.get("daily_streak", 0);

  const STATE = { MENU: 0, PLAYING: 1, DYING: 2, DEAD: 3, PAUSED: 4 };
  let state = STATE.MENU;
  let score = 0, sessionCoins = 0, reviveUsed = false;

  const BIRD_SIZE = 22, THRUST_POWER = 0.55, DRIFT_GRAV = 0.30, MAX_VY = 7;
  const PIPE_WIDTH = 16, PIPE_GAP_START = 240, PIPE_GAP_MIN = 175;
  const PIPE_SPEED_START = 3.0, PIPE_SPEED_MAX = 5.5, PIPE_SPACING = 300;
  const GROUND_HEIGHT = 70, AD_EVERY_N_DEATHS = 3, REVIVE_COST = 50;
  const TICK_MS = 1000 / 60; // fixed 60 ticks/s
  let lastTime = 0, accumulator = 0;

  let bird = { x:0, y:0, vy:0, angle:0, wingPhase:0, trail:[] };
  let pipes = [], pipeTimer = 0, floatingCoins = [], isThrusting = false;
  let gameSpeed = PIPE_SPEED_START, pipeGap = PIPE_GAP_START;
  let groundX = 0, shakeX = 0, shakeY = 0, shakeMag = 0, flash = 0;
  let starParticles = [], particles = [], speedLines = [];
  // === SLOW-MO / BULLET TIME ===
  let timeScale = 1, timeScaleTarget = 1;
  let chromAb = 0; // chromatic aberration intensity
  let screenPulse = 0; // bass drop pulse
  let deathFreezeFrames = 0; // freeze before slow-mo
  let envDebris = []; // flying debris particles
  const streakMilestones = [5,10,15,20,25,30,40,50,75,100];
  let streakTimer = 0;

  // === COMBO SYSTEM ===
  let combo = 0, comboTimer = 0, comboMultiplier = 1, maxCombo = 0;
  const COMBO_DECAY = 180; // ticks before combo resets (~3s)

  // === POWER-UPS ===
  const POWERUP_TYPES = [
    { id:'shield', icon:'🛡️', color:'#00ffaa', dur:300, desc:'Tarcza' },
    { id:'magnet', icon:'🧲', color:'#ff00e6', dur:360, desc:'Magnes' },
    { id:'slowmo', icon:'⏳', color:'#00aaff', dur:240, desc:'Slow-Mo' },
    { id:'x2',     icon:'×2', color:'#ffee00', dur:300, desc:'x2 Monety' },
  ];
  let activePowerUp = null, powerUpTimer = 0, powerUpOrbs = [];
  let shieldHits = 0;

  let audioCtx;
  function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    if (type==="flap") {
      osc.type="triangle"; osc.frequency.setValueAtTime(200,t);
      osc.frequency.exponentialRampToValueAtTime(500,t+0.06);
      osc.frequency.exponentialRampToValueAtTime(300,t+0.12);
      gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      osc.start(t); osc.stop(t+0.15);
    } else if (type==="score") {
      osc.type="square"; osc.frequency.setValueAtTime(520,t);
      osc.frequency.setValueAtTime(680,t+0.06); osc.frequency.setValueAtTime(880,t+0.12);
      gain.gain.setValueAtTime(0.08,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      osc.start(t); osc.stop(t+0.25);
    } else if (type==="hit") {
      osc.type="sawtooth"; osc.frequency.setValueAtTime(200,t);
      osc.frequency.exponentialRampToValueAtTime(50,t+0.3);
      gain.gain.setValueAtTime(0.15,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      osc.start(t); osc.stop(t+0.3);
    } else if (type==="milestone") {
      osc.type="sine"; osc.frequency.setValueAtTime(600,t);
      osc.frequency.setValueAtTime(800,t+0.08); osc.frequency.setValueAtTime(1000,t+0.16);
      osc.frequency.setValueAtTime(1200,t+0.24);
      gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      osc.start(t); osc.stop(t+0.4);
    } else if (type==="coin") {
      osc.type="sine"; osc.frequency.setValueAtTime(800,t);
      osc.frequency.setValueAtTime(1200,t+0.05);
      gain.gain.setValueAtTime(0.06,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      osc.start(t); osc.stop(t+0.1);
    } else if (type==="buy") {
      osc.type="sine"; osc.frequency.setValueAtTime(500,t);
      osc.frequency.setValueAtTime(700,t+0.1); osc.frequency.setValueAtTime(900,t+0.2);
      gain.gain.setValueAtTime(0.08,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      osc.start(t); osc.stop(t+0.3);
    } else if (type==="revive") {
      osc.type="sine"; osc.frequency.setValueAtTime(400,t);
      osc.frequency.setValueAtTime(600,t+0.15); osc.frequency.setValueAtTime(800,t+0.3);
      osc.frequency.setValueAtTime(1000,t+0.45);
      gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.start(t); osc.stop(t+0.5);
    } else if (type==="powerup") {
      osc.type="sine"; osc.frequency.setValueAtTime(600,t);
      osc.frequency.setValueAtTime(900,t+0.08); osc.frequency.setValueAtTime(1200,t+0.16);
      osc.frequency.setValueAtTime(1500,t+0.24);
      gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      osc.start(t); osc.stop(t+0.35);

      osc.start(t); osc.stop(t+0.2);
    }
  }

  function renderShop() {
    document.getElementById("shop-coins").textContent = coins;

    grid.innerHTML = "";
    for (const s of SKINS) {
      const owned = ownedSkins.includes(s.id);
      const equipped = equippedSkin === s.id;
      const canBuy = coins >= s.price;
      const card = document.createElement("div");
      card.className = "skin-card" + (equipped?" equipped":owned?" owned":!canBuy?" locked":"");
      const bg = s.body === "rainbow" ? "conic-gradient(red,orange,yellow,green,cyan,blue,violet,red)" : s.body;
      card.innerHTML = `
        <div class="skin-preview" style="background:${bg};box-shadow:0 0 10px ${s.glow}"></div>
        <div class="skin-name">${s.name}</div>
        <div class="skin-price ${s.price===0?'free':''}">
          ${equipped?'✓ Aktywny':owned?'Wybierz':s.price===0?'Darmowy':s.price+' 🪙'}
        </div>`;
      card.addEventListener("click", () => {
        if (equipped) return;
        if (owned) {
          equippedSkin = s.id; STORAGE.set("skin", equippedSkin);
          playSound("buy"); renderShop(); return;
        }
        if (s.price === 0 || coins >= s.price) {
          coins -= s.price; ownedSkins.push(s.id); equippedSkin = s.id;
          STORAGE.set("coins",coins); STORAGE.set("owned",ownedSkins); STORAGE.set("skin",equippedSkin);
          updateCoinHud(); playSound("buy"); renderShop();
        }
      });
      grid.appendChild(card);
    }
  }

  const ADMOB_INTERSTITIAL_ANDROID = 'ca-app-pub-XXXX/INTERSTITIAL_ANDROID';

  const ADMOB_REWARDED_ANDROID     = 'ca-app-pub-XXXX/REWARDED_ANDROID';

  // ── Test IDs (Google oficjalne — działają bez konta) ──
  const TEST_INTERSTITIAL_ANDROID = 'ca-app-pub-3940256099942544/1033173712';
  const TEST_INTERSTITIAL_IOS     = 'ca-app-pub-3940256099942544/4411468910';
  const TEST_REWARDED_ANDROID     = 'ca-app-pub-3940256099942544/5224354917';

  // Użyj TEST IDs dopóki nie wstawisz swoich:
  const USE_TEST_ADS = true;
  function getAdId(type) {
    const isIos = IS_NATIVE && window.Capacitor.getPlatform() === 'ios';
    if (USE_TEST_ADS) {
      return type === 'interstitial'
        ? (isIos ? TEST_INTERSTITIAL_IOS : TEST_INTERSTITIAL_ANDROID)
        : (isIos ? TEST_REWARDED_IOS : TEST_REWARDED_ANDROID);
    }
    return type === 'interstitial'
      ? (isIos ? ADMOB_INTERSTITIAL_IOS : ADMOB_INTERSTITIAL_ANDROID)
      : (isIos ? ADMOB_REWARDED_IOS : ADMOB_REWARDED_ANDROID);
  }

  // ── Init AdMob (native only) ──
  async function initAdMob() {
    if (!IS_NATIVE) return;
    try {
      const mod = await import('https://unpkg.com/@capacitor-community/admob@latest/dist/esm/index.js').catch(() => null);
      if (mod && mod.AdMob) {
        admobPlugin = mod.AdMob;
        await admobPlugin.initialize({ initializeForTesting: USE_TEST_ADS });
        admobReady = true;
        console.log('[AdMob] Initialized');
      }
    } catch(e) { console.warn('[AdMob] Init failed:', e); }
  }
  initAdMob();

  // ── Init AdSense ad slot (web only) ──
  function pushAdSense() {
    try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
  }

  // ── INTERSTITIAL ──
  function showInterstitialAd(onDone) {
    if (IS_NATIVE && admobReady) {
      showNativeInterstitial(onDone);

  async function showNativeInterstitial(onDone) {
    try {
      await admobPlugin.prepareInterstitial({ adId: getAdId('interstitial') });
      const handler = admobPlugin.addListener('onInterstitialAdDismissed', () => {
        handler.remove(); onDone();
      });
      await admobPlugin.showInterstitial();
    } catch(e) {
      console.warn('[AdMob] Interstitial failed:', e);
      onDone();
    }
  }

    adInterstitial.classList.add("active");

        skipEl.innerHTML = "Pomiń ✕";

        skipEl.style.pointerEvents = "auto";

  function spawnPipe() {
    const gapVariation = (Math.random() - 0.5) * 60;
    const thisGap = Math.max(PIPE_GAP_MIN, Math.min(pipeGap + gapVariation, PIPE_GAP_START + 20));
    const minY=80, maxY=H-GROUND_HEIGHT-thisGap-80;
    const topH = minY+Math.random()*(maxY-minY);
    // Ruchome bramy od score 5 (40% szans)
    const isMoving = score >= 5 && Math.random() < 0.4;
    const moveSpeed = 0.5 + Math.random() * 0.8;
    const moveRange = 25 + Math.random() * 35;
    pipes.push({ x:W+20, topH, gap:thisGap, scored:false, glow:0,
      moving:isMoving, moveDir:Math.random()<0.5?1:-1, moveSpeed,
      moveMin:Math.max(60,topH-moveRange), moveMax:Math.min(H-GROUND_HEIGHT-thisGap-60,topH+moveRange) });
    // Losowa moneta między rurami (70% szans)
    if (Math.random() < 0.7) {
      const coinY = topH + thisGap * (0.2 + Math.random() * 0.6);
      floatingCoins.push({ x: W + 20 + PIPE_WIDTH/2, y: coinY, collected: false, wobble: Math.random()*Math.PI*2 });
    }
    // Bonus coin w trudnym miejscu (20% przy wyższych score)
    if (score > 5 && Math.random() < 0.2) {
      const bonusY = Math.random() * (H - GROUND_HEIGHT - 100) + 50;
      floatingCoins.push({ x: W + 120 + Math.random()*80, y: bonusY, collected: false, wobble: Math.random()*Math.PI*2, bonus: true });
    }
    // Power-up orb (8% chance, not during active power-up)
    if (score > 3 && Math.random() < 0.08 && !activePowerUp) {
      const puType = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
      const puY = topH + thisGap * (0.3 + Math.random() * 0.4);
      powerUpOrbs.push({ x: W + 80 + Math.random()*60, y: puY, type: puType, collected: false, wobble: Math.random()*Math.PI*2 });
    }
  }

  // === COMBO ===
  function addCombo() {
    combo++; comboTimer=COMBO_DECAY;
    comboMultiplier=1+Math.floor(combo/3)*0.5; // x1, x1.5, x2, x2.5...
    if(combo>maxCombo) maxCombo=combo;
    comboText.textContent=`x${combo}`;
    comboFill.style.width='100%';
    comboHud.classList.add('visible','bump');
    setTimeout(()=>comboHud.classList.remove('bump'),150);
    if(combo===5||combo===10||combo===15||combo===20) {
      showStreak(`🔥 COMBO x${combo}!`);
      playSound('milestone');
      burst(bird.x,bird.y,'#ff00e6',15+combo);
      chromAb=4+combo*0.5; screenPulse=0.6; triggerBassPulse('combo');
      haptic();
    }
  }
  function decayCombo() {
    if(comboTimer>0){ comboTimer--; comboFill.style.width=(comboTimer/COMBO_DECAY*100)+'%'; }
    else if(combo>0){ combo=0; comboMultiplier=1; comboHud.classList.remove('visible'); }
  }

  // === ZONE CHECK ===
  function checkZone() {
    let zi=0;
    for(let i=ZONES.length-1;i>=0;i--) { if(score>=ZONES[i].from){zi=i;break;} }
    if(zi!==lastZoneIdx) {
      lastZoneIdx=zi; currentZone=ZONES[zi];
      zoneBanner.textContent=currentZone.name;
      zoneBanner.style.color=currentZone.accent;
      zoneBanner.style.textShadow=`0 0 30px ${currentZone.accent}`;
      zoneBanner.classList.add('show');
      setTimeout(()=>zoneBanner.classList.remove('show'),2000);
      playSound('milestone'); haptic();
    }
  }

  // === ACHIEVEMENTS ===
  function checkAchievements() {
    for(const a of ACHIEVEMENTS) {
      if(!unlockedAchievements.includes(a.id) && a.cond()) {
        unlockedAchievements.push(a.id);
        STORAGE.set('achievements', unlockedAchievements);
        achievementQueue.push(a.name);
        if(!achievementShowing) showNextAchievement();
      }
    }
  }
  function showNextAchievement() {
    if(!achievementQueue.length){ achievementShowing=false; return; }
    achievementShowing=true;
    const name=achievementQueue.shift();
    achievementToast.textContent=`🏆 ${name}`;
    achievementToast.classList.add('show');
    playSound('buy');
    setTimeout(()=>{ achievementToast.classList.remove('show'); setTimeout(showNextAchievement,400); },2500);
  }

  // =============================================
  //  PROCEDURAL SYNTHWAVE MUSIC
  // =============================================
  let musicPlaying = false, musicNodes = [];
  const MUSIC_VOL = 0.045;
  // Chord progression: Am - F - C - G (synthwave classic)
  const CHORDS = [
    [220.00, 261.63, 329.63],  // Am
    [174.61, 220.00, 261.63],  // F
    [261.63, 329.63, 392.00],  // C
    [196.00, 246.94, 293.66],  // G
  ];
  const BASS_NOTES = [110, 87.31, 130.81, 98]; // A2, F2, C3, G2
  const ARP_PATTERNS = [
    [0,1,2,1], [0,2,1,2], [2,1,0,1], [1,0,2,0]
  ];

  function startMusic() {
    if(musicPlaying || !audioCtx) return;
    musicPlaying = true;
    const master = audioCtx.createGain();
    master.gain.value = MUSIC_VOL;
    master.connect(audioCtx.destination);
    musicNodes.push(master);

    // === PAD (warm detuned saw) ===
    function playPad() {
      if(!musicPlaying) return;
      const now = audioCtx.currentTime;
      const BPM = 110, beatLen = 60/BPM, barLen = beatLen*4;
      for(let bar=0; bar<4; bar++) {
        const chord = CHORDS[bar];
        const t = now + bar*barLen;
        for(const freq of chord) {
          for(let d=-6; d<=6; d+=6) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            const filt = audioCtx.createBiquadFilter();
            osc.type = 'sawtooth';
            osc.frequency.value = freq + d*0.15;
            filt.type = 'lowpass'; filt.frequency.value = 800; filt.Q.value = 0.7;
            osc.connect(filt); filt.connect(g); g.connect(master);
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.22, t+0.3);
            g.gain.setValueAtTime(0.22, t+barLen-0.4);
            g.gain.linearRampToValueAtTime(0, t+barLen);
            osc.start(t); osc.stop(t+barLen+0.01);
          }
        }
      }
      setTimeout(playPad, barLen*4*1000 - 100);
    }

    // === BASS (sub sine + square octave up) ===
    function playBass() {
      if(!musicPlaying) return;
      const now = audioCtx.currentTime;
      const BPM = 110, beatLen = 60/BPM, barLen = beatLen*4;
      for(let bar=0; bar<4; bar++) {
        const freq = BASS_NOTES[bar];
        const t = now + bar*barLen;
        // 8th note pattern
        for(let i=0; i<8; i++) {
          const nt = t + i*beatLen*0.5;
          const isHit = (i===0||i===3||i===5||i===6);
          if(!isHit) continue;
          // Sub
          const osc1 = audioCtx.createOscillator();
          const g1 = audioCtx.createGain();
          osc1.type = 'sine'; osc1.frequency.value = freq;
          osc1.connect(g1); g1.connect(master);
          g1.gain.setValueAtTime(0.5, nt);
          g1.gain.exponentialRampToValueAtTime(0.01, nt+beatLen*0.45);
          osc1.start(nt); osc1.stop(nt+beatLen*0.5);
          // Octave square
          const osc2 = audioCtx.createOscillator();
          const g2 = audioCtx.createGain();
          const filt = audioCtx.createBiquadFilter();
          osc2.type = 'square'; osc2.frequency.value = freq*2;
          filt.type = 'lowpass'; filt.frequency.value = 400;
          osc2.connect(filt); filt.connect(g2); g2.connect(master);
          g2.gain.setValueAtTime(0.12, nt);
          g2.gain.exponentialRampToValueAtTime(0.01, nt+beatLen*0.4);
          osc2.start(nt); osc2.stop(nt+beatLen*0.5);
        }
      }
      setTimeout(playBass, barLen*4*1000 - 100);
    }

    // === ARPEGGIO (chiptune triangle) ===
    function playArp() {
      if(!musicPlaying) return;
      const now = audioCtx.currentTime;
      const BPM = 110, beatLen = 60/BPM, barLen = beatLen*4, sixteenth = beatLen*0.25;
      for(let bar=0; bar<4; bar++) {
        const chord = CHORDS[bar];
        const pattern = ARP_PATTERNS[bar];
        const t = now + bar*barLen;
        for(let i=0; i<16; i++) {
          const nt = t + i*sixteenth;
          const noteIdx = pattern[i%4];
          const freq = chord[noteIdx] * 2; // one octave up
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          const filt = audioCtx.createBiquadFilter();
          osc.type = 'triangle'; osc.frequency.value = freq;
          filt.type = 'lowpass'; filt.frequency.value = 2000;
          osc.connect(filt); filt.connect(g); g.connect(master);
          g.gain.setValueAtTime(0.18, nt);
          g.gain.exponentialRampToValueAtTime(0.01, nt+sixteenth*0.8);
          osc.start(nt); osc.stop(nt+sixteenth);
        }
      }
      setTimeout(playArp, barLen*4*1000 - 100);
    }

    // === HI-HAT (noise bursts) ===
    function playHihat() {
      if(!musicPlaying) return;
      const now = audioCtx.currentTime;
      const BPM = 110, beatLen = 60/BPM, barLen = beatLen*4;
      const bufLen = audioCtx.sampleRate * 0.05;
      const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0; i<bufLen; i++) data[i] = (Math.random()*2-1)*0.5;
      for(let bar=0; bar<4; bar++) {
        for(let i=0; i<8; i++) {
          const nt = now + bar*barLen + i*beatLen*0.5;
          const src = audioCtx.createBufferSource();
          const g = audioCtx.createGain();
          const hp = audioCtx.createBiquadFilter();
          src.buffer = buf;
          hp.type = 'highpass'; hp.frequency.value = 8000;
          src.connect(hp); hp.connect(g); g.connect(master);
          const vol = (i%2===0) ? 0.3 : 0.12;
          g.gain.setValueAtTime(vol, nt);
          g.gain.exponentialRampToValueAtTime(0.01, nt+0.04);
          src.start(nt); src.stop(nt+0.05);
        }
      }
      setTimeout(playHihat, barLen*4*1000 - 100);
    }

    playPad(); playBass(); playArp(); playHihat();
  }

  // =============================================
  //  UPDATE
  // =============================================
  function update() {
    for (const s of starParticles) {
      s.flicker+=0.03;
      if(state===STATE.PLAYING) s.x-=s.speed*gameSpeed*0.3;
      if(s.x<0){ s.x=W; s.y=Math.random()*H; }
    }
    if(streakTimer>0){ streakTimer--; if(streakTimer===0)streakPopup.classList.remove("show"); }

    if (state===STATE.MENU) {
      bird.x=W*0.22; bird.y=H*0.42+Math.sin(Date.now()/400)*12;
      bird.angle=Math.sin(Date.now()/500)*0.1; bird.wingPhase+=0.15; return;
    }
    if (state===STATE.PLAYING) {
      if(isThrusting){bird.vy-=THRUST_POWER;if(bird.vy<-MAX_VY)bird.vy=-MAX_VY;}
      else{bird.vy+=DRIFT_GRAV;if(bird.vy>MAX_VY)bird.vy=MAX_VY;}
      bird.vy*=0.98; bird.y+=bird.vy;
      bird.angle=Math.max(-0.5,Math.min(bird.vy*0.06,1.2));
      bird.wingPhase+=isThrusting?0.35:0.12;
      bird.trail.push({x:bird.x,y:bird.y,life:1});
      if(bird.trail.length>15)bird.trail.shift();
      for(const t of bird.trail) t.life-=0.07;
      if(isThrusting){
        // Double exhaust particles
        for(let i=0;i<2;i++){const a=Math.PI+Math.random()*0.6-0.3;particles.push({x:bird.x-BIRD_SIZE*0.5,y:bird.y+(Math.random()-0.5)*4,vx:Math.cos(a)*4,vy:Math.sin(a)*2,life:0.6,decay:0.04,size:2+Math.random()*3,color:getSkinColors().thrust});}
        // Hot sparks 
        if(Math.random()>0.6) particles.push({x:bird.x-BIRD_SIZE*0.5,y:bird.y+(Math.random()-0.5)*6,vx:-2-Math.random()*3,vy:(Math.random()-0.5)*3,life:0.4,decay:0.05,size:1+Math.random(),color:'#ffffff'});
      }
      // Ambient environment sparks at high speed
      if(gameSpeed>3.5 && Math.random()>0.85) {
        particles.push({x:W+5,y:Math.random()*(H-GROUND_HEIGHT),vx:-gameSpeed*3,vy:(Math.random()-0.5)*0.5,life:0.5,decay:0.025,size:1+Math.random(),color:currentZone.accent});
      }
      // Power-up collection
      for(let i=powerUpOrbs.length-1;i>=0;i--) {
        const pu=powerUpOrbs[i];
        pu.x-=gameSpeed; pu.wobble+=0.06;
        if(pu.collected || pu.x < -30) { powerUpOrbs.splice(i,1); continue; }
        const dx=bird.x-pu.x, dy=bird.y-pu.y;
        if(dx*dx+dy*dy < 22*22) {
          pu.collected=true; powerUpOrbs.splice(i,1);
          activePowerUp=pu.type; powerUpTimer=pu.type.dur;
          powerupHud.textContent=`${pu.type.icon} ${pu.type.desc}`;
          powerupHud.style.color=pu.type.color;
          powerupHud.classList.add('visible');
          playSound('powerup'); haptic();
          burst(pu.x,pu.y,pu.type.color,20);
          showStreak(`${pu.type.icon} ${pu.type.desc}!`);
        }
      }
      // Power-up timer
      if(activePowerUp) {
        powerUpTimer--;
        if(powerUpTimer<=0) { activePowerUp=null; powerupHud.classList.remove('visible'); }
        // Magnet: attract coins
        if(activePowerUp && activePowerUp.id==='magnet') {
          for(const c of floatingCoins) {
            if(c.collected) continue;
            const dx=bird.x-c.x, dy=bird.y-c.y;
            const dist=Math.sqrt(dx*dx+dy*dy);
            if(dist < 120) { c.x+=dx/dist*4; c.y+=dy/dist*4; }
          }
        }
        // Slow-mo
        if(activePowerUp && activePowerUp.id==='slowmo') {
          gameSpeed=Math.max(PIPE_SPEED_START*0.5, gameSpeed*0.97);
        }
      }

      groundX-=gameSpeed; if(groundX<-40) groundX+=40;
      pipeTimer-=gameSpeed; if(pipeTimer<=0){ spawnPipe(); pipeTimer=PIPE_SPACING; }

      // Zbieranie monet (kolizja z ptakiem)
      for(let i=floatingCoins.length-1;i>=0;i--) {
        const c=floatingCoins[i];
        c.x-=gameSpeed;
        c.wobble+=0.05;
        if(c.x < -20) { floatingCoins.splice(i,1); continue; }
        if(c.collected) continue;
        // Magnet radius already handled above
        const dx=bird.x-c.x, dy=bird.y-c.y;
        if(dx*dx+dy*dy < 20*20) {
          c.collected=true;
          const amt = (c.bonus ? 3 : 1) * (activePowerUp && activePowerUp.id==='x2' ? 2 : 1);
          addCoins(amt); playSound("coin"); addCombo();
          showCoinPopup(c.x, c.y-15, amt);
          burst(c.x, c.y, "#ffee00", 8);
          floatingCoins.splice(i,1);
        }
      }

      for(let i=pipes.length-1;i>=0;i--) {
        const p=pipes[i];
        p.x-=gameSpeed;
        if(p.moving){p.topH+=p.moveDir*p.moveSpeed;if(p.topH<=p.moveMin||p.topH>=p.moveMax)p.moveDir*=-1;}
        if(p.glow>0) p.glow-=0.03;
        const pRight=p.x-(56-PIPE_WIDTH)/2+56; // right edge of visual panel
        if(!p.scored && pRight<bird.x) {
          p.scored=true; p.glow=1; score++;
          scoreDisplay.textContent=score;
          playSound("score"); addCombo(); checkZone(); spawnSpeedLines();
          const distTop=Math.abs(bird.y-p.topH),distBot=Math.abs(bird.y-(p.topH+p.gap));
          const nearDist=Math.min(distTop,distBot);
          if(streakMilestones.includes(score)){playSound("milestone");showStreak(`🔥 ${score}!`);burst(W/2,H*0.3,"#ffee00",20);haptic();}
          else if(nearDist<25){driftCount++;addCoins(Math.ceil(2*comboMultiplier));showStreak(`⚡ DRIFT x${comboMultiplier.toFixed(1)}!`);burst(bird.x,bird.y,"#00ffaa",18);playSound("coin");haptic();chromAb=3;triggerBassPulse('drift');}
          gameSpeed=Math.min(PIPE_SPEED_MAX, PIPE_SPEED_START+score*0.025);
          pipeGap=Math.max(PIPE_GAP_MIN, PIPE_GAP_START-score*0.5);
        }
        if(p.x+56<-10) pipes.splice(i,1);
      }
      if(checkCollision()) {
        // Shield power-up save
        if(activePowerUp && activePowerUp.id==='shield') {
          activePowerUp=null; powerUpTimer=0; powerupHud.classList.remove('visible');
          shieldHits++; playSound('shield'); haptic(); shakeMag=6; flash=0.5;
          burst(bird.x,bird.y,'#00ffaa',20);
          bird.vy=bird.vy>0?-3:3; // bounce away from danger
          showStreak('🛡️ TARCZA!');
        } else {
          state=STATE.DYING; playSound("hit"); haptic(); shakeMag=18; flash=1;
          chromAb=12; screenPulse=1; deathFreezeFrames=6;
          timeScaleTarget=0.2; // BULLET TIME
          triggerBassPulse('hit');
          burst(bird.x,bird.y,"#ff4466",40); burst(bird.x,bird.y,"#ffee00",20);
          burst(bird.x,bird.y,"#ffffff",15); // white sparks
          // Explosion ring
          for(let i=0;i<24;i++){const a=i/24*Math.PI*2;particles.push({x:bird.x,y:bird.y,vx:Math.cos(a)*6,vy:Math.sin(a)*6,life:0.8,decay:0.02,size:3,color:'#ff0066'});}
          // Debris
          for(let i=0;i<12;i++) envDebris.push({x:bird.x,y:bird.y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-3,rot:0,rotV:(Math.random()-0.5)*0.3,size:3+Math.random()*5,life:1,color:Math.random()>0.5?'#ff4466':'#ffee00'});
        }
      }
    }
    decayCombo();
    // Time scale lerp
    timeScale+=(timeScaleTarget-timeScale)*0.08;
    if(Math.abs(timeScale-timeScaleTarget)<0.01) timeScale=timeScaleTarget;
    chromAb*=0.92; screenPulse*=0.88;
    // Env debris
    for(let i=envDebris.length-1;i>=0;i--) {
      const d=envDebris[i]; d.x+=d.vx; d.y+=d.vy; d.vy+=0.15; d.rot+=d.rotV; d.life-=0.012;
      if(d.life<=0) envDebris.splice(i,1);
    }
    if (state===STATE.DYING) {
      if(deathFreezeFrames>0){deathFreezeFrames--;} else {
      isThrusting=false;
      bird.vy+=DRIFT_GRAV*2; bird.y+=bird.vy; bird.angle+=0.15;
      shakeMag*=0.9; shakeX=(Math.random()-0.5)*shakeMag; shakeY=(Math.random()-0.5)*shakeMag;
      flash*=0.85;
      // Dying trail sparks
      if(Math.random()>0.5) particles.push({x:bird.x+(Math.random()-0.5)*10,y:bird.y+(Math.random()-0.5)*10,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:0.6,decay:0.03,size:2+Math.random()*3,color:Math.random()>0.5?'#ff4466':'#ff8800'});
      if(bird.y>H-GROUND_HEIGHT+20){ state=STATE.DEAD; timeScaleTarget=1; chromAb=0; showGameOver(); }
      }
    }
    for(let i=particles.length-1;i>=0;i--) {
      const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay;
      if(p.life<=0) particles.splice(i,1);
    }
    // Speed lines
    for(let i=speedLines.length-1;i>=0;i--) {
      const sl=speedLines[i]; sl.x-=gameSpeed*3; sl.life-=0.03;
      if(sl.life<=0||sl.x+sl.len<0) speedLines.splice(i,1);
    }
    checkAchievements();
  }

  // =============================================
  //  DRAWING
  // =============================================
  function drawBackground() {
    const z=currentZone;
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,z.bg1); grad.addColorStop(0.4,z.bg2);
    grad.addColorStop(0.7,z.bg3); grad.addColorStop(1,z.bg1);
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    // Stars
    for(const s of starParticles) {
      ctx.globalAlpha=0.3+Math.sin(s.flicker)*0.3; ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    // === FAR LAYER: Nebula clouds ===
    const nebulaT=Date.now()*0.0001;
    for(let i=0;i<4;i++) {
      const nx=(nebulaT*20+i*W*0.4)%(W*1.5)-W*0.25;
      const ny=H*0.2+Math.sin(nebulaT+i*2)*H*0.15;
      const nr=80+i*35;
      ctx.globalAlpha=0.035;
      const nebGrad=ctx.createRadialGradient(nx,ny,0,nx,ny,nr);
      nebGrad.addColorStop(0,z.accent); nebGrad.addColorStop(0.5,z.laser+'30'); nebGrad.addColorStop(1,'transparent');
      ctx.fillStyle=nebGrad;
      ctx.beginPath(); ctx.arc(nx,ny,nr,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    // === MID LAYER: Industrial structures (parallax 0.3x) ===
    const midOff=state===STATE.PLAYING?groundX*0.3:Date.now()*0.005;
    ctx.globalAlpha=0.15;
    for(let i=0;i<5;i++) {
      const sx=((midOff+i*W*0.28)%(W*1.4))-W*0.2;
      const sBaseY=H-GROUND_HEIGHT-30;
      const tw=8+(i%3)*4, th=60+(i%4)*40;
      ctx.fillStyle=z.bg3; ctx.fillRect(sx,sBaseY-th,tw,th);
      ctx.strokeStyle=z.accent; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(sx+tw/2,sBaseY-th); ctx.lineTo(sx+tw/2,sBaseY-th-15); ctx.stroke();
      if(Math.sin(Date.now()*0.003+i*1.5)>0.5) {
        ctx.fillStyle=z.accent; ctx.shadowColor=z.accent; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(sx+tw/2,sBaseY-th-15,2,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
      }
      ctx.strokeStyle=z.bg2;
      for(let by=sBaseY-th+15;by<sBaseY;by+=20) {
        ctx.beginPath(); ctx.moveTo(sx,by); ctx.lineTo(sx+tw,by+10); ctx.stroke();
      }
    }
    ctx.globalAlpha=1;
    // === NEAR LAYER: City skyline (parallax 0.6x) ===
    const cityOff=state===STATE.PLAYING?groundX*0.6:Date.now()*0.008;
    const cityY=H-GROUND_HEIGHT-50;
    for(let x=0;x<W+30;x+=25+Math.sin(x*0.08)*15) {
      const bx=((x+cityOff)%(W+60))-30;
      const h=15+Math.abs(Math.sin(x*0.04))*55;
      const by=cityY+50-h;
      ctx.fillStyle="rgba(10,10,35,0.8)";
      ctx.fillRect(bx,by,16+Math.sin(x)*6,h);
      ctx.fillStyle="rgba(0,200,255,0.15)";
      for(let wy=by+4;wy<by+h-6;wy+=8) {
        if(Math.sin(x*3+wy*2)>0.3) ctx.fillRect(bx+3,wy,4,3);
        if(Math.sin(x*5+wy)>0.4) ctx.fillRect(bx+9,wy,4,3);
      }
    }
    // Floating hologram rings
    ctx.strokeStyle=z.accent; ctx.lineWidth=1;
    const holoOff=Date.now()*0.008;
    for(let i=0;i<3;i++) {
      const hx=(holoOff*25+i*W/3)%W, hy=H*0.25+Math.sin(holoOff*0.5+i)*40;
      ctx.globalAlpha=0.025+Math.sin(holoOff+i*2)*0.01;
      ctx.beginPath(); ctx.ellipse(hx,hy,30+i*8,8+i*3,0.2+Math.sin(holoOff*0.3+i)*0.3,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=1;
    // === DATA STREAM LINES ===
    const dsOff=Date.now()*0.05;
    for(let i=0;i<6;i++) {
      const dy=H*0.15+i*H*0.12, dx=(dsOff+i*200)%(W+300)-150, dLen=40+i*15;
      ctx.globalAlpha=0.06;
      const dsGrad=ctx.createLinearGradient(dx,dy,dx+dLen,dy);
      dsGrad.addColorStop(0,'transparent'); dsGrad.addColorStop(0.5,z.accent); dsGrad.addColorStop(1,'transparent');
      ctx.strokeStyle=dsGrad; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(dx,dy); ctx.lineTo(dx+dLen,dy); ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  function drawPipe(p) {
    const topH=p.topH, botY=topH+p.gap;
    const z=currentZone;
    const PANEL_W=56;
    const px=p.x-(PANEL_W-PIPE_WIDTH)/2; // center visual around hitbox
    const cx=px+PANEL_W/2; // center x
    const beamFlicker=0.7+Math.sin(Date.now()/80+p.x)*0.3;
    // === TOP WALL PANEL ===
    const tGrad=ctx.createLinearGradient(px,0,px+PANEL_W,0);
    tGrad.addColorStop(0,'#080c14'); tGrad.addColorStop(0.12,'#0e1a2a');
    tGrad.addColorStop(0.5,'#142840'); tGrad.addColorStop(0.88,'#0e1a2a');
    tGrad.addColorStop(1,'#080c14');
    ctx.fillStyle=tGrad; ctx.fillRect(px,0,PANEL_W,topH);
    // Panel edge glow
    ctx.strokeStyle='rgba(0,180,255,0.18)'; ctx.lineWidth=1;
    ctx.strokeRect(px+1,0,PANEL_W-2,topH);
    // Horizontal circuit traces
    ctx.strokeStyle='rgba(0,140,220,0.07)'; ctx.lineWidth=1;
    for(let y=18;y<topH-8;y+=24) {
      ctx.beginPath(); ctx.moveTo(px+8,y); ctx.lineTo(px+PANEL_W-8,y); ctx.stroke();
      if(Math.sin(y*0.12+Date.now()*0.003)>0.3) {
        ctx.fillStyle=z.accent+'44';
        ctx.beginPath(); ctx.arc(px+8+(y%3)*14,y,1.5,0,Math.PI*2); ctx.fill();
      }
    }
    // Vertical circuit traces
    ctx.strokeStyle='rgba(0,140,220,0.05)';
    for(let x=px+12;x<px+PANEL_W-8;x+=16) {
      ctx.beginPath(); ctx.moveTo(x,8); ctx.lineTo(x,topH-8); ctx.stroke();
    }
    // Warning stripes near emitter
    for(let sy=topH-28;sy<topH-10;sy+=6) {
      ctx.fillStyle=(sy/6)%2===0?'rgba(255,180,0,0.06)':'transparent';
      ctx.fillRect(px+4,sy,PANEL_W-8,3);
    }
    // TOP EMITTER (gate frame)
    const emH=12;
    ctx.fillStyle='#0c1e30'; ctx.fillRect(px-6,topH-emH,PANEL_W+12,emH);
    ctx.fillStyle=z.laser+'66'; ctx.fillRect(px-2,topH-emH+2,PANEL_W+4,emH-4);
    ctx.shadowColor=z.laser; ctx.shadowBlur=12;
    ctx.fillStyle=z.laser; ctx.fillRect(px+2,topH-3,PANEL_W-4,2);
    ctx.shadowBlur=0;
    // Status LEDs
    for(let lx=px+8;lx<px+PANEL_W-4;lx+=10) {
      ctx.fillStyle=Math.sin(Date.now()*0.005+lx)>0?z.accent:'#0a0a1a';
      ctx.beginPath(); ctx.arc(lx,topH-emH+5,1.2,0,Math.PI*2); ctx.fill();
    }
    // === BOTTOM WALL PANEL ===
    const bGrad=ctx.createLinearGradient(px,botY,px+PANEL_W,botY);
    bGrad.addColorStop(0,'#080c14'); bGrad.addColorStop(0.12,'#0e1a2a');
    bGrad.addColorStop(0.5,'#142840'); bGrad.addColorStop(0.88,'#0e1a2a');
    bGrad.addColorStop(1,'#080c14');
    ctx.fillStyle=bGrad; ctx.fillRect(px,botY,PANEL_W,H-botY-GROUND_HEIGHT);
    ctx.strokeStyle='rgba(0,180,255,0.18)'; ctx.lineWidth=1;
    ctx.strokeRect(px+1,botY,PANEL_W-2,H-botY-GROUND_HEIGHT);
    // Horizontal circuit traces (bottom)
    ctx.strokeStyle='rgba(0,140,220,0.07)'; ctx.lineWidth=1;
    for(let y=botY+18;y<H-GROUND_HEIGHT-8;y+=24) {
      ctx.beginPath(); ctx.moveTo(px+8,y); ctx.lineTo(px+PANEL_W-8,y); ctx.stroke();
      if(Math.sin(y*0.12+Date.now()*0.003)>0.3) {
        ctx.fillStyle=z.accent+'44';
        ctx.beginPath(); ctx.arc(px+PANEL_W-8-(y%3)*14,y,1.5,0,Math.PI*2); ctx.fill();
      }
    }
    // Vertical circuit traces (bottom)
    ctx.strokeStyle='rgba(0,140,220,0.05)';
    for(let x=px+12;x<px+PANEL_W-8;x+=16) {
      ctx.beginPath(); ctx.moveTo(x,botY+8); ctx.lineTo(x,H-GROUND_HEIGHT-8); ctx.stroke();
    }
    // Warning stripes near emitter (bottom)
    for(let sy=botY+10;sy<botY+28;sy+=6) {
      ctx.fillStyle=(sy/6)%2===0?'rgba(255,180,0,0.06)':'transparent';
      ctx.fillRect(px+4,sy,PANEL_W-8,3);
    }
    // BOTTOM EMITTER
    ctx.fillStyle='#0c1e30'; ctx.fillRect(px-6,botY,PANEL_W+12,emH);
    ctx.fillStyle=z.laser+'66'; ctx.fillRect(px-2,botY+2,PANEL_W+4,emH-4);
    ctx.shadowColor=z.laser; ctx.shadowBlur=12;
    ctx.fillStyle=z.laser; ctx.fillRect(px+2,botY+1,PANEL_W-4,2);
    ctx.shadowBlur=0;
    for(let lx=px+8;lx<px+PANEL_W-4;lx+=10) {
      ctx.fillStyle=Math.sin(Date.now()*0.005+lx+1)>0?z.accent:'#0a0a1a';
      ctx.beginPath(); ctx.arc(lx,botY+emH-5,1.2,0,Math.PI*2); ctx.fill();
    }
    // === ENERGY FIELD IN GAP ===
    ctx.globalAlpha=beamFlicker*0.1;
    const eGrad=ctx.createLinearGradient(px,topH,px,botY);
    eGrad.addColorStop(0,z.laser); eGrad.addColorStop(0.5,'transparent'); eGrad.addColorStop(1,z.laser);
    ctx.fillStyle=eGrad; ctx.fillRect(px,topH,PANEL_W,p.gap);
    ctx.globalAlpha=1;
    // Horizontal scan line in gap
    const scanY=topH+(Date.now()*0.05+p.x)%(p.gap);
    ctx.globalAlpha=0.15; ctx.strokeStyle=z.laser; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px+4,scanY); ctx.lineTo(px+PANEL_W-4,scanY); ctx.stroke();
    ctx.globalAlpha=1;
    // === GATE FRAME (corner brackets) ===
    const cLen=14;
    ctx.strokeStyle=z.accent; ctx.lineWidth=2.5; ctx.shadowColor=z.accent; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(px-3,topH+cLen); ctx.lineTo(px-3,topH); ctx.lineTo(px+cLen,topH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+PANEL_W+3,topH+cLen); ctx.lineTo(px+PANEL_W+3,topH); ctx.lineTo(px+PANEL_W-cLen,topH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px-3,botY-cLen); ctx.lineTo(px-3,botY); ctx.lineTo(px+cLen,botY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+PANEL_W+3,botY-cLen); ctx.lineTo(px+PANEL_W+3,botY); ctx.lineTo(px+PANEL_W-cLen,botY); ctx.stroke();
    ctx.shadowBlur=0;
    // Gate center crosshair
    const gapMid=topH+p.gap/2;
    ctx.globalAlpha=0.12; ctx.strokeStyle=z.accent; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-8,gapMid); ctx.lineTo(cx+8,gapMid); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,gapMid-8); ctx.lineTo(cx,gapMid+8); ctx.stroke();
    ctx.globalAlpha=1;
    // Score glow on gap
    if(p.glow>0) {
      ctx.fillStyle=`rgba(0,255,200,${p.glow*0.2})`;
      ctx.fillRect(px-6,topH,PANEL_W+12,p.gap);
    }
    // Moving gate indicator
    if(p.moving) {
      const arrY=topH+p.gap/2, dir=p.moveDir;
      ctx.fillStyle='rgba(255,100,0,0.5)'; ctx.shadowColor='#ff6600'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.moveTo(cx-6,arrY); ctx.lineTo(cx+6,arrY); ctx.lineTo(cx,arrY+dir*10); ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
    }
  }

  function drawFloatingCoins() {
    for(const c of floatingCoins) {
      if(c.collected) continue;
      const wobble=Math.sin(c.wobble)*3;
      const r = c.bonus ? 10 : 8;
      ctx.save();
      ctx.shadowColor=c.bonus?"#ff00e6":"#ffee00"; ctx.shadowBlur=12;
      ctx.fillStyle=c.bonus?"#ff66ff":"#ffee00";
      ctx.beginPath(); ctx.arc(c.x,c.y+wobble,r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=c.bonus?"#cc44cc":"#ffaa00";
      ctx.beginPath(); ctx.arc(c.x,c.y+wobble,r*0.6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=c.bonus?"#ff88ff":"#ffee00";
      ctx.font=`bold ${r-1}px sans-serif`; ctx.textAlign="center";
      ctx.fillText(c.bonus?"$":"$",c.x,c.y+wobble+3);
      ctx.restore();
    }
  }

  function drawGround() {
    const gy=H-GROUND_HEIGHT;
    const z=currentZone;
    const gGrad=ctx.createLinearGradient(0,gy,0,H);
    gGrad.addColorStop(0,z.ground); gGrad.addColorStop(0.15,z.bg1); gGrad.addColorStop(1,'#020008');
    ctx.fillStyle=gGrad; ctx.fillRect(0,gy,W,GROUND_HEIGHT);
    // Horizon glow line
    ctx.shadowColor=z.accent; ctx.shadowBlur=18;
    ctx.strokeStyle=z.accent; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
    ctx.shadowBlur=0;
    // Secondary glow
    ctx.strokeStyle="rgba(0,200,255,0.1)"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,gy+1); ctx.lineTo(W,gy+1); ctx.stroke();
    // Perspective grid
    ctx.strokeStyle="rgba(255,0,230,0.1)"; ctx.lineWidth=1;
    for(let x=groundX;x<W;x+=35){ ctx.beginPath(); ctx.moveTo(x,gy+2); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=gy+12;y<H;y+=12){
      const fade=1-((y-gy)/GROUND_HEIGHT)*0.7;
      ctx.strokeStyle=`rgba(255,0,230,${0.1*fade})`;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
    // === FLOWING LIGHT DOTS (data highway) ===
    const dotOff=Date.now()*0.06;
    ctx.fillStyle=z.accent;
    for(let lane=0;lane<3;lane++) {
      const ly=gy+8+lane*16;
      ctx.globalAlpha=0.3-lane*0.07;
      for(let i=0;i<10;i++) {
        const dx=(dotOff*(1.5-lane*0.3)+i*W/8)%W;
        ctx.beginPath(); ctx.arc(dx,ly,1.5,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha=1;
    // === GROUND STRUCTURES ===
    ctx.globalAlpha=0.35;
    for(let i=0;i<5;i++) {
      const gsx=((groundX*0.8+i*W*0.25)%(W+40))-20;
      if(i%2===0) {
        ctx.strokeStyle=z.bg2; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(gsx,gy); ctx.lineTo(gsx,gy-7-(i%3)*4); ctx.stroke();
        ctx.fillStyle=z.accent;
        ctx.beginPath(); ctx.arc(gsx,gy-7-(i%3)*4,1.5,0,Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle='#0a1525'; ctx.fillRect(gsx-4,gy-5,8,5);
        ctx.fillStyle=z.accent+'66'; ctx.fillRect(gsx-2,gy-4,2,2);
      }
    }
    ctx.globalAlpha=1;
  }

  function getSkinColors() {
    const s=SKINS.find(sk=>sk.id===equippedSkin)||SKINS[0];
    if(s.body==="rainbow") {
      const hue=(Date.now()/10)%360;
      return { body:`hsl(${hue},100%,60%)`, glow:`hsl(${hue},100%,50%)`, ring:`hsl(${(hue+120)%360},80%,40%)`, thrust:`hsl(${(hue+60)%360},100%,70%)` };
    }
    return { body:s.body, glow:s.glow, ring:s.ring, thrust:s.thrust };
  }

  function drawBird() {
    const sk=getSkinColors();
    ctx.save(); ctx.translate(bird.x,bird.y); ctx.rotate(bird.angle);
    // Trail
    for(const t of bird.trail) {
      if(t.life<=0) continue;
      ctx.globalAlpha=t.life*0.35; ctx.fillStyle=sk.thrust;
      ctx.beginPath(); ctx.arc(t.x-bird.x,t.y-bird.y,3*t.life,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    // === THRUST ENGINE ===
    const thrustLen=isThrusting?(14+Math.sin(bird.wingPhase*4)*6):(2+Math.sin(bird.wingPhase*2)*1.5);
    const thrustSpread=isThrusting?9:4;
    ctx.shadowColor=sk.thrust; ctx.shadowBlur=isThrusting?28:8;
    ctx.fillStyle=sk.thrust; ctx.globalAlpha=isThrusting?0.9:0.4;
    ctx.beginPath(); ctx.moveTo(-BIRD_SIZE*0.5,0); ctx.lineTo(-BIRD_SIZE*0.5-thrustLen-6,-thrustSpread); ctx.lineTo(-BIRD_SIZE*0.5-thrustLen-6,thrustSpread); ctx.closePath(); ctx.fill();
    if(isThrusting){ctx.fillStyle='#ffffff';ctx.globalAlpha=0.5;ctx.beginPath();ctx.moveTo(-BIRD_SIZE*0.5,0);ctx.lineTo(-BIRD_SIZE*0.5-thrustLen*0.5,-thrustSpread*0.3);ctx.lineTo(-BIRD_SIZE*0.5-thrustLen*0.5,thrustSpread*0.3);ctx.closePath();ctx.fill();}
    ctx.globalAlpha=1;
    // === ROTATING ARC SEGMENTS (3 segments, not solid ring) ===
    const ringR=BIRD_SIZE*0.52;
    const segAngle=Math.PI*0.5, gapAngle=Math.PI*0.17;
    const rotSpeed=Date.now()*0.002;
    ctx.shadowColor=sk.glow; ctx.shadowBlur=15;
    ctx.strokeStyle=sk.ring; ctx.lineWidth=2.5;
    for(let i=0;i<3;i++) {
      const sA=rotSpeed+i*(segAngle+gapAngle);
      ctx.beginPath(); ctx.arc(0,0,ringR,sA,sA+segAngle); ctx.stroke();
    }
    // === OUTER SENSOR PINS ===
    ctx.shadowBlur=0; ctx.strokeStyle=sk.ring; ctx.lineWidth=1; ctx.globalAlpha=0.6;
    const pinR=BIRD_SIZE*0.64;
    for(let i=0;i<4;i++) {
      const pa=rotSpeed*0.7+i*Math.PI*0.5+0.3;
      const ppx=Math.cos(pa)*ringR, ppy=Math.sin(pa)*ringR;
      const ppx2=Math.cos(pa)*pinR, ppy2=Math.sin(pa)*pinR;
      ctx.beginPath(); ctx.moveTo(ppx,ppy); ctx.lineTo(ppx2,ppy2); ctx.stroke();
      ctx.fillStyle=sk.glow; ctx.beginPath(); ctx.arc(ppx2,ppy2,1.5,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    // === CORE ORB ===
    ctx.shadowColor=sk.glow; ctx.shadowBlur=18;
    const orbGrad=ctx.createRadialGradient(0,-3,2,0,0,BIRD_SIZE*0.38);
    orbGrad.addColorStop(0,"rgba(255,255,255,0.9)"); orbGrad.addColorStop(0.3,sk.body); orbGrad.addColorStop(1,sk.glow);
    ctx.fillStyle=orbGrad;
    ctx.beginPath(); ctx.arc(0,0,BIRD_SIZE*0.38,0,Math.PI*2); ctx.fill();
    // Inner highlight
    ctx.fillStyle="rgba(255,255,255,0.35)";
    ctx.beginPath(); ctx.arc(-2,-4,BIRD_SIZE*0.14,0,Math.PI*2); ctx.fill();
    // === FRONT DIRECTION CHEVRON ===
    ctx.shadowBlur=0;
    ctx.strokeStyle=sk.glow; ctx.lineWidth=1.5; ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.moveTo(BIRD_SIZE*0.3,-4); ctx.lineTo(BIRD_SIZE*0.45,0); ctx.lineTo(BIRD_SIZE*0.3,4); ctx.stroke();
    ctx.globalAlpha=1;
    // Hex scanner
    const scanAngle=(Date.now()/180)%(Math.PI*2);
    ctx.strokeStyle=sk.glow; ctx.lineWidth=1; ctx.globalAlpha=0.4;
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(scanAngle)*BIRD_SIZE*0.35,Math.sin(scanAngle)*BIRD_SIZE*0.35);
    ctx.stroke(); ctx.globalAlpha=1;
    ctx.restore();
  }

  function drawPowerUpOrbs() {
    for(const pu of powerUpOrbs) {
      if(pu.collected) continue;
      const w=Math.sin(pu.wobble)*4;
      ctx.save();
      ctx.shadowColor=pu.type.color; ctx.shadowBlur=18;
      // Outer glow ring
      ctx.strokeStyle=pu.type.color; ctx.lineWidth=2; ctx.globalAlpha=0.5+Math.sin(pu.wobble*2)*0.3;
      ctx.beginPath(); ctx.arc(pu.x,pu.y+w,14,0,Math.PI*2); ctx.stroke();
      // Inner
      ctx.globalAlpha=1;
      ctx.fillStyle=pu.type.color;
      ctx.beginPath(); ctx.arc(pu.x,pu.y+w,9,0,Math.PI*2); ctx.fill();
      // Icon
      ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.fillStyle='#fff';
      ctx.fillText(pu.type.icon,pu.x,pu.y+w+4);
      ctx.restore();
    }
  }

  function drawSpeedLines() {
    for(const sl of speedLines) {
      ctx.globalAlpha=sl.life*0.15;
      ctx.strokeStyle=currentZone.accent; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(sl.x,sl.y); ctx.lineTo(sl.x+sl.len,sl.y); ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  // Shield bubble around drone
  function drawShieldBubble() {
    if(!activePowerUp || activePowerUp.id!=='shield') return;
    const pulse=0.7+Math.sin(Date.now()/150)*0.3;
    ctx.save(); ctx.globalAlpha=pulse*0.3;
    ctx.strokeStyle='#00ffaa'; ctx.lineWidth=2; ctx.shadowColor='#00ffaa'; ctx.shadowBlur=15;
    ctx.beginPath(); ctx.arc(bird.x,bird.y,BIRD_SIZE*0.7,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  function drawParticles() {
    for(const p of particles) {
      ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  function drawFlash() {
    if(flash>0.01){ ctx.fillStyle=`rgba(255,68,102,${flash*0.3})`; ctx.fillRect(0,0,W,H); }
    // Screen pulse (bass drop glow from edges)
    if(screenPulse>0.01) {
      const pg=ctx.createRadialGradient(W/2,H/2,W*0.2, W/2,H/2,W*0.8);
      pg.addColorStop(0,'transparent');
      pg.addColorStop(1,`rgba(255,0,230,${screenPulse*0.2})`);
      ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    }
  }

  function drawEnvDebris() {
    for(const d of envDebris) {
      ctx.save(); ctx.translate(d.x,d.y); ctx.rotate(d.rot);
      ctx.globalAlpha=d.life; ctx.fillStyle=d.color; ctx.shadowColor=d.color; ctx.shadowBlur=4;
      ctx.fillRect(-d.size/2,-d.size/2,d.size,d.size*0.4);
      ctx.restore();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  // === POST-PROCESSING: Chromatic Aberration ===
  function postProcess() {
    if(chromAb<0.3 && timeScale>0.9) { fxCanvas.classList.remove('active'); return; }
    fxCanvas.classList.add('active');
    fxCtx.clearRect(0,0,W,H);
    const ab=chromAb;
    // Red channel shift left
    fxCtx.globalCompositeOperation='source-over';
    fxCtx.globalAlpha=0.3;
    fxCtx.drawImage(canvas,-ab*2,0,W,H);
    // Cyan channel shift right
    fxCtx.globalCompositeOperation='lighter';
    fxCtx.globalAlpha=0.15;
    fxCtx.drawImage(canvas,ab*2,0,W,H);
    fxCtx.globalAlpha=1; fxCtx.globalCompositeOperation='source-over';
  }

  // === BASS PULSE (border flash) ===
  function triggerBassPulse(type) {
    bassPulse.className=''; void bassPulse.offsetWidth; bassPulse.classList.add(type);
    setTimeout(()=>bassPulse.className='',200);
  }

  // =============================================
  //  GAME LOOP (fixed timestep — 60 ticks/s)
  // =============================================
  function frame(now) {
    if(state===STATE.PAUSED) { lastTime=0; requestAnimationFrame(frame); return; }
    if (!lastTime) lastTime = now;
    const rawDt = Math.min(now - lastTime, 100);
    lastTime = now;
    // Apply slow-mo time scale
    const dt = rawDt * timeScale;
    accumulator += dt;
    while (accumulator >= TICK_MS) {
      update();
      accumulator -= TICK_MS;
    }
    ctx.save();
    if(shakeMag>0.5) ctx.translate(shakeX,shakeY);
    drawBackground();
    drawSpeedLines();
    for(const p of pipes) drawPipe(p);
    drawFloatingCoins(); drawPowerUpOrbs();
    drawGround(); drawBird(); drawShieldBubble(); drawEnvDebris(); drawParticles(); drawFlash();
    ctx.restore();
    // Post-processing pass
    postProcess();
    requestAnimationFrame(frame);
  }

  resetGame(); requestAnimationFrame(frame);

  // PWA
  if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(()=>{});
})();
</script>
</body>
</html>
