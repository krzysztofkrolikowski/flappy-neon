  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playSound(type) {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    const dest = audioCtx.destination;

    function synth(wave, freq, endFreq, dur, vol, filterFreq) {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = wave;
      o.frequency.setValueAtTime(freq, t);
      if (endFreq !== freq) o.frequency.exponentialRampToValueAtTime(endFreq, t + dur * 0.8);
      g.gain.setValueAtTime(vol, t);
      g.gain.linearRampToValueAtTime(0, t + dur);
      if (filterFreq) {
        const f = audioCtx.createBiquadFilter();
        f.type = 'lowpass'; f.frequency.setValueAtTime(filterFreq, t);
        f.Q.setValueAtTime(2, t);
        o.connect(f); f.connect(g);
      } else { o.connect(g); }
      g.connect(dest);
      o.start(t); o.stop(t + dur);
    }

    if (type === "flap") {
      // Soft thruster puff
      const bufLen = audioCtx.sampleRate * 0.04;
      const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 2);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const filt = audioCtx.createBiquadFilter();
      filt.type = 'bandpass'; filt.frequency.setValueAtTime(1000, t);
      filt.frequency.exponentialRampToValueAtTime(350, t + 0.035); filt.Q.setValueAtTime(1, t);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.035, t); g.gain.linearRampToValueAtTime(0, t + 0.04);
      src.connect(filt); filt.connect(g); g.connect(dest);
      src.start(t); src.stop(t + 0.04);

    } else if (type === "score") {
      // Dark data-blip — low square tick, descending
      synth('square', 220, 140, 0.06, 0.015, 500);

    } else if (type === "hit") {
      // Muffled impact
      const bufLen = audioCtx.sampleRate * 0.2;
      const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const filt = audioCtx.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.setValueAtTime(1200, t);
      filt.frequency.exponentialRampToValueAtTime(50, t + 0.18); filt.Q.setValueAtTime(1, t);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.06, t); g.gain.linearRampToValueAtTime(0, t + 0.2);
      src.connect(filt); filt.connect(g); g.connect(dest);
      src.start(t); src.stop(t + 0.2);
      synth('sine', 55, 30, 0.15, 0.03);

    } else if (type === "milestone") {
      // Neutral tech 3-note — triangle, flat/slight rise
      [400, 480, 520].forEach((freq, i) => {
        const delay = i * 0.07;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        const f = audioCtx.createBiquadFilter();
        o.type = 'triangle'; o.frequency.setValueAtTime(freq, t + delay);
        f.type = 'lowpass'; f.frequency.setValueAtTime(900, t + delay); f.Q.setValueAtTime(1, t);
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.022, t + delay + 0.015);
        g.gain.linearRampToValueAtTime(0, t + delay + 0.13);
        o.connect(f); f.connect(g); g.connect(dest);
        o.start(t + delay); o.stop(t + delay + 0.13);
      });

    } else if (type === "coin") {
      // Sharp metallic tick — triangle descending
      synth('triangle', 650, 280, 0.035, 0.02, 900);

    } else if (type === "buy") {
      // Mechanical confirmation — two low clicks
      synth('square', 300, 180, 0.05, 0.018, 450);
      synth('square', 200, 130, 0.06, 0.02, 400);

    } else if (type === "revive") {
      // Dark energy charge — low ominous sweep
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const f = audioCtx.createBiquadFilter();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(80, t);
      o.frequency.exponentialRampToValueAtTime(320, t + 0.35);
      f.type = 'lowpass'; f.frequency.setValueAtTime(200, t);
      f.frequency.exponentialRampToValueAtTime(800, t + 0.3); f.Q.setValueAtTime(4, t);
      g.gain.setValueAtTime(0.02, t); g.gain.linearRampToValueAtTime(0.035, t + 0.2);
      g.gain.linearRampToValueAtTime(0, t + 0.4);
      o.connect(f); f.connect(g); g.connect(dest);
      o.start(t); o.stop(t + 0.4);

    } else if (type === "powerup") {
      // Dark resonant pulse — filtered sawtooth
      synth('sawtooth', 120, 220, 0.2, 0.025, 400);

    } else if (type === "shield") {
      // Soft tap
      synth('triangle', 350, 180, 0.08, 0.03, 700);
    }
  }

  function drawShopDrone(cvs, s) {
    const c=cvs.getContext('2d'), W=cvs.width, H=cvs.height, cx=W/2, cy=H/2, t=Date.now()*0.001;
    c.clearRect(0,0,W,H);
    const sk={body:s.body==='rainbow'?'#ff00e6':s.body, glow:s.glow, ring:s.ring, thrust:s.thrust};
    c.save(); c.translate(cx,cy);
    const R=14, rR=18;
    if(s.id==='fire'){
      // Delta fighter
      c.fillStyle=sk.body; c.shadowColor=sk.glow; c.shadowBlur=10;
      c.beginPath(); c.moveTo(R*1.8,0); c.lineTo(-R*0.8,-R*1.7); c.lineTo(-R*0.6,0); c.lineTo(-R*0.8,R*1.7); c.closePath(); c.fill();
      c.strokeStyle=sk.glow; c.lineWidth=1.5; c.globalAlpha=0.7;
      c.beginPath(); c.moveTo(R*1.6,0); c.lineTo(-R*0.8,-R*1.7); c.stroke();
      c.beginPath(); c.moveTo(R*1.6,0); c.lineTo(-R*0.8,R*1.7); c.stroke();
      c.fillStyle='#111'; c.globalAlpha=0.8;
      c.beginPath(); c.moveTo(R*0.6,0); c.lineTo(0,-R*0.3); c.lineTo(-R*0.3,0); c.lineTo(0,R*0.3); c.closePath(); c.fill();
      c.fillStyle=sk.glow; c.globalAlpha=0.5;
      c.beginPath(); c.moveTo(R*0.6,0); c.lineTo(0,-R*0.3); c.lineTo(-R*0.3,0); c.lineTo(0,R*0.3); c.closePath(); c.fill();
      // Weapon pods
      for(const side of[-1,1]){c.fillStyle=sk.ring; c.globalAlpha=0.8; c.beginPath(); c.arc(-R*0.2,side*R*1,2.5,0,Math.PI*2); c.fill();}
      // Afterburner glow
      c.fillStyle=sk.thrust; c.globalAlpha=0.6;
      c.beginPath(); c.moveTo(-R*0.7,-4); c.lineTo(-R*1.6,-6); c.lineTo(-R*1.6,6); c.lineTo(-R*0.7,4); c.closePath(); c.fill();
    } else if(s.id==='toxic'){
      // Organic blob + tentacles
      const breathe=1+Math.sin(t*4)*0.08;
      c.fillStyle=sk.body; c.shadowColor=sk.glow; c.shadowBlur=12;
      c.beginPath();
      for(let a=0;a<Math.PI*2;a+=0.1){const w=1+Math.sin(a*3+t*5)*0.15; c.lineTo(Math.cos(a)*R*1.2*breathe*w,Math.sin(a)*R*1.2*breathe*w);}
      c.closePath(); c.fill();

        for(let j=1;j<=4;j++){tx+=Math.cos(ta+Math.sin(t*3+i+j)*0.8)*4;ty+=Math.sin(ta+Math.sin(t*2+i-j)*0.6)*4;c.lineTo(tx,ty);}
        c.stroke(); c.fillStyle=sk.glow; c.globalAlpha=0.6; c.beginPath(); c.arc(tx,ty,2,0,Math.PI*2); c.fill();}
      c.lineCap='butt';
      // Eye
      c.fillStyle='#001100'; c.globalAlpha=0.9; c.beginPath(); c.ellipse(R*0.1,0,R*0.35,R*0.25,0,0,Math.PI*2); c.fill();
      c.fillStyle=sk.glow; c.globalAlpha=0.9; c.beginPath(); c.arc(R*0.15,0,R*0.12,0,Math.PI*2); c.fill();
      c.fillStyle='#000'; c.globalAlpha=0.8; c.beginPath(); c.ellipse(R*0.15,0,R*0.03,R*0.09,0,0,Math.PI*2); c.fill();
    } else if(s.id==='sunset'){
      // Sun disk + wings
      const sunG=c.createRadialGradient(0,0,R*0.2,0,0,R*1.1);
      sunG.addColorStop(0,'#fffbe8'); sunG.addColorStop(0.3,'#ffe0a0'); sunG.addColorStop(0.6,sk.body); sunG.addColorStop(1,sk.glow);
      c.fillStyle=sunG; c.shadowColor=sk.glow; c.shadowBlur=15;
      c.beginPath(); c.arc(0,0,R*1.1,0,Math.PI*2); c.fill();

  let shopAnimFrame=0;
  function animateShopPreviews(){
    const canvases=document.querySelectorAll('.skin-preview-canvas');
    if(!canvases.length){cancelAnimationFrame(shopAnimFrame);shopAnimFrame=0;return;}
    canvases.forEach(function(cvs){const s=SKINS.find(function(sk){return sk.id===cvs.dataset.skinId;}); if(s) drawShopDrone(cvs,s);});
    shopAnimFrame=requestAnimationFrame(animateShopPreviews);
  }

  function renderShop() {
    document.getElementById("shop-coins").textContent = coins;
    const grid = document.getElementById("shop-grid");
    grid.innerHTML = "";
    if(shopAnimFrame){cancelAnimationFrame(shopAnimFrame);shopAnimFrame=0;}
    for (const s of SKINS) {
      const owned = ownedSkins.includes(s.id);
      const equipped = equippedSkin === s.id;
      const canBuy = coins >= s.price;
      const card = document.createElement("div");
      card.className = "skin-card" + (equipped?" equipped":owned?" owned":!canBuy?" locked":"");
      const cvs = document.createElement("canvas");
      cvs.width=52; cvs.height=52; cvs.className='skin-preview skin-preview-canvas'; cvs.dataset.skinId=s.id;
      const info = document.createElement("div");
      info.innerHTML = `<div class="skin-name">${s.name}</div>
        <div style="font-size:9px;color:rgba(255,255,255,0.4);margin-bottom:2px">${s.desc}</div>
        ${s.perkDesc ? '<div style="font-size:9px;color:#ffee00;margin-bottom:3px;font-weight:700">'+s.perkDesc+'</div>' : '<div style="font-size:9px;color:rgba(255,255,255,0.2);margin-bottom:3px">Brak perku</div>'}
        <div class="skin-price ${s.price===0?'free':''}">
          ${equipped?'✓ Aktywny':owned?'Wybierz':s.price===0?'Darmowy':s.price+' 🪙'}

  function spawnPipe() {
    const gapVariation = (Math.random() - 0.5) * 60;
    const gapMod = hasPerk('gap_widen') ? 1.08 : 1;
    const thisGap = Math.max(PIPE_GAP_MIN, Math.min((pipeGap + gapVariation) * gapMod, (PIPE_GAP_START + 20) * gapMod));
    const minY=80, maxY=H-GROUND_HEIGHT-thisGap-80;

    // === Reachability: limit gap center distance from previous pipe ===
    // Player max vertical travel: ~MAX_VY * (PIPE_SPACING / gameSpeed) pixels
    // We cap gap-center difference so the player can always reach the next gap
    const travelTicks = PIPE_SPACING / Math.max(gameSpeed, PIPE_SPEED_START);
    const maxReach = MAX_VY * travelTicks * 0.65; // 65% of theoretical max (safety margin)
    let topH;
    const prev = pipes.length > 0 ? pipes[pipes.length - 1] : null;
    if (prev) {
      const prevCenter = prev.topH + prev.gap / 2;
      // If prev is moving, account for its worst-case position
      const prevWorst = prev.moving ? prev.moveRange || 0 : 0;
      const lo = Math.max(minY, prevCenter - thisGap/2 - maxReach + prevWorst);
      const hi = Math.min(maxY, prevCenter - thisGap/2 + maxReach - prevWorst);
      if (lo < hi) {
        topH = lo + Math.random() * (hi - lo);
      } else {
        // Fallback: center on previous gap
        topH = Math.max(minY, Math.min(maxY, prevCenter - thisGap/2));
      }
    } else {
      topH = minY + Math.random() * (maxY - minY);
    }

    // Ruchome bramy od score 5 (60% szans)
    const isMoving = score >= 5 && Math.random() < 0.6;
    const moveSpeed = 0.5 + Math.random() * 0.8;
    // Limit moveRange so both extremes stay reachable from previous pipe
    let moveRange = 25 + Math.random() * 35;
    if (prev && isMoving) {
      const prevCenter = prev.topH + prev.gap / 2;
      const thisCenter = topH + thisGap / 2;
      const dist = Math.abs(thisCenter - prevCenter);
      const prevWorst = prev.moving ? (prev.moveRange || 0) : 0;
      // Ensure: dist + moveRange + prevWorst <= maxReach
      const allowed = Math.max(10, maxReach - dist - prevWorst);
      moveRange = Math.min(moveRange, allowed);
    }
    const moveMin = Math.max(60, topH - moveRange);
    const moveMax = Math.min(H - GROUND_HEIGHT - thisGap - 60, topH + moveRange);
    // If bounds are too tight, disable movement
    const effectiveMoving = isMoving && (moveMax - moveMin > 15);

    pipes.push({ x:W+20, topH, gap:thisGap, scored:false, glow:0,
      moving:effectiveMoving, moveDir:Math.random()<0.5?1:-1, moveSpeed,
      moveMin, moveMax, moveRange });
    // Losowa moneta między rurami (70% szans)
    if (Math.random() < 0.7) {
      const coinY = topH + thisGap * (0.2 + Math.random() * 0.6);
      floatingCoins.push({ x: W + 20 + PIPE_WIDTH/2, y: coinY, collected: false, wobble: Math.random()*Math.PI*2 });
    }
    // Bonus coin w trudnym miejscu (20% przy wyższych score)
    if (score > 5 && Math.random() < 0.2) {
      const bonusY = Math.random() * (H - GROUND_HEIGHT - 100) + 50;
      floatingCoins.push({ x: W + 120 + Math.random()*80, y: bonusY, collected: false, wobble: Math.random()*Math.PI*2, bonus: true });
    }
    // Power-up orb (8% chance, not during active power-up)
    const puChance = hasPerk('powerup_luck') ? 0.16 : 0.08;
    if (score > 3 && Math.random() < puChance && !activePowerUp) {
      const puType = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
      const puY = topH + thisGap * (0.3 + Math.random() * 0.4);
      powerUpOrbs.push({ x: W + 80 + Math.random()*60, y: puY, type: puType, collected: false, wobble: Math.random()*Math.PI*2 });
    }
  }

  // =============================================
  //  SPACE AMBIENT MUSIC
  // =============================================
  let musicPlaying = false, musicNodes = [];
  const MUSIC_VOL = 0.05;
  // Ethereal space: Em9 - Cmaj7 - Am7 - Bm (open voicings, fifths)
  const CHORDS = [
    [164.81, 246.94, 369.99],  // Em (E3, B3, F#4)
    [130.81, 196.00, 329.63],  // C  (C3, G3, E4)
    [110.00, 164.81, 261.63],  // Am (A2, E3, C4)
    [123.47, 185.00, 293.66],  // Bm (B2, F#3, D4)
  ];
  const BASS_NOTES = [82.41, 65.41, 55.00, 61.74]; // E2, C2, A1, B1
  const ARP_NOTES = [
    [329.63,493.88,659.26,493.88],
    [261.63,392.00,523.25,392.00],
    [220.00,329.63,440.00,329.63],
    [246.94,369.99,493.88,369.99],
  ];

  function startMusic() {
    if(musicPlaying || !audioCtx) return;
    musicPlaying = true;
    const master = audioCtx.createGain();
    master.gain.value = MUSIC_VOL;
    // Limiter to prevent clipping
    const limiter = audioCtx.createDynamicsCompressor();
    limiter.threshold.value = -6; limiter.knee.value = 12;
    limiter.ratio.value = 8; limiter.attack.value = 0.002; limiter.release.value = 0.15;
    master.connect(limiter); limiter.connect(audioCtx.destination);
    musicNodes.push(master, limiter);

    const BPM = 90, beatLen = 60/BPM, barLen = beatLen*4;
    const loopLen = barLen*4;
    let nextPad = 0, nextBass = 0, nextPing = 0, nextTex = 0;

    // === SPACE PAD (sine + shimmer, crossfaded) ===
    function playPad() {
      if(!musicPlaying) return;
      const now = audioCtx.currentTime;
      const start = Math.max(now + 0.05, nextPad);
      for(let bar=0; bar<4; bar++) {
        const chord = CHORDS[bar];
        const t = start + bar*barLen;
        for(const freq of chord) {
          // Warm sine
          const osc1 = audioCtx.createOscillator();
          const g1 = audioCtx.createGain();
          osc1.type = 'sine'; osc1.frequency.value = freq;
          osc1.connect(g1); g1.connect(master);
          g1.gain.setValueAtTime(0, t);
          g1.gain.linearRampToValueAtTime(0.09, t+barLen*0.35);
          g1.gain.setValueAtTime(0.09, t+barLen*0.65);
          g1.gain.linearRampToValueAtTime(0, t+barLen);
          osc1.start(t); osc1.stop(t+barLen+0.05);
          // Detuned shimmer
          const osc2 = audioCtx.createOscillator();
          const g2 = audioCtx.createGain();
          const filt = audioCtx.createBiquadFilter();
          osc2.type = 'triangle'; osc2.frequency.value = freq*1.002;
          filt.type = 'lowpass'; filt.frequency.value = 600; filt.Q.value = 0.5;
          osc2.connect(filt); filt.connect(g2); g2.connect(master);
          g2.gain.setValueAtTime(0, t);
          g2.gain.linearRampToValueAtTime(0.05, t+barLen*0.4);
          g2.gain.linearRampToValueAtTime(0, t+barLen);
          osc2.start(t); osc2.stop(t+barLen+0.05);
        }
      }
      nextPad = start + loopLen;
      setTimeout(playPad, (nextPad - audioCtx.currentTime - 0.3)*1000);
    }

    // === DEEP SPACE BASS ===
    function playBass() {
      if(!musicPlaying) return;
      const now = audioCtx.currentTime;
      const start = Math.max(now + 0.05, nextBass);
      for(let bar=0; bar<4; bar++) {
        const freq = BASS_NOTES[bar];
        const t = start + bar*barLen;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        osc.connect(g); g.connect(master);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.28, t+beatLen*0.8);
        g.gain.setValueAtTime(0.28, t+barLen-beatLen*0.8);
        g.gain.linearRampToValueAtTime(0, t+barLen);
        osc.start(t); osc.stop(t+barLen+0.05);
      }
      nextBass = start + loopLen;
      setTimeout(playBass, (nextBass - audioCtx.currentTime - 0.3)*1000);
    }

    // === COSMIC PINGS (sparse, gentle) ===
    function playPings() {
      if(!musicPlaying) return;
      const now = audioCtx.currentTime;
      const start = Math.max(now + 0.05, nextPing);
      for(let bar=0; bar<4; bar++) {
        const notes = ARP_NOTES[bar];
        const t = start + bar*barLen;
        const hits = [0, 1.3, 2.5, 3.2];
        for(let i=0; i<hits.length; i++) {
          const nt = t + hits[i]*beatLen;
          const freq = notes[i%notes.length] * 2;
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.type = 'sine'; osc.frequency.value = freq;
          osc.connect(g); g.connect(master);
          g.gain.setValueAtTime(0.10, nt);
          g.gain.linearRampToValueAtTime(0, nt+beatLen*1.8);
          osc.start(nt); osc.stop(nt+beatLen*1.9);
          // Shimmer echo
          const osc2 = audioCtx.createOscillator();
          const g2 = audioCtx.createGain();
          osc2.type = 'triangle'; osc2.frequency.value = freq*1.003;
          osc2.connect(g2); g2.connect(master);
          const echo = beatLen*0.6;
          g2.gain.setValueAtTime(0, nt+echo);
          g2.gain.linearRampToValueAtTime(0.03, nt+echo+0.03);
          g2.gain.linearRampToValueAtTime(0, nt+echo+beatLen*1.2);
          osc2.start(nt+echo); osc2.stop(nt+echo+beatLen*1.3);
        }
      }
      nextPing = start + loopLen;
      setTimeout(playPings, (nextPing - audioCtx.currentTime - 0.3)*1000);
    }

    // === SPACE TEXTURE (gentle filtered noise + sparse ticks) ===
    function playTexture() {
      if(!musicPlaying) return;
      const now = audioCtx.currentTime;
      const start = Math.max(now + 0.05, nextTex);
      // Reuse noise buffer
      const noiseBufLen = audioCtx.sampleRate * 2;
      const noiseBuf = audioCtx.createBuffer(1, noiseBufLen, audioCtx.sampleRate);
      const nd = noiseBuf.getChannelData(0);
      for(let i=0; i<noiseBufLen; i++) nd[i] = (Math.random()*2-1);

      // Filtered noise wash
      const src = audioCtx.createBufferSource();
      const ng = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      src.buffer = noiseBuf; src.loop = true;
      bp.type = 'bandpass'; bp.frequency.value = 400; bp.Q.value = 6;
      bp.frequency.setValueAtTime(250, start);
      bp.frequency.linearRampToValueAtTime(700, start+loopLen*0.5);
      bp.frequency.linearRampToValueAtTime(300, start+loopLen);
      src.connect(bp); bp.connect(ng); ng.connect(master);
      ng.gain.setValueAtTime(0, start);
      ng.gain.linearRampToValueAtTime(0.025, start+loopLen*0.15);
      ng.gain.setValueAtTime(0.025, start+loopLen*0.85);
      ng.gain.linearRampToValueAtTime(0, start+loopLen);
      src.start(start); src.stop(start+loopLen+0.05);

      // Sparse ticks
      const tickBufLen = audioCtx.sampleRate * 0.012;
      const tickBuf = audioCtx.createBuffer(1, tickBufLen, audioCtx.sampleRate);
      const td = tickBuf.getChannelData(0);
      for(let i=0; i<tickBufLen; i++) td[i] = (Math.random()*2-1)*Math.exp(-i/(tickBufLen*0.15));
      for(let i=0; i<6; i++) {
        const tt = start + (i*beatLen*2.5) + Math.random()*beatLen*0.2;
        if(tt >= start+loopLen) continue;
        const tsrc = audioCtx.createBufferSource();
        const tg = audioCtx.createGain();
        const thp = audioCtx.createBiquadFilter();
        tsrc.buffer = tickBuf;
        thp.type = 'highpass'; thp.frequency.value = 7000+Math.random()*3000;
        tsrc.connect(thp); thp.connect(tg); tg.connect(master);
        tg.gain.setValueAtTime(0.04+Math.random()*0.03, tt);
        tg.gain.linearRampToValueAtTime(0, tt+0.025);
        tsrc.start(tt); tsrc.stop(tt+0.03);
      }

      nextTex = start + loopLen;
      setTimeout(playTexture, (nextTex - audioCtx.currentTime - 0.3)*1000);
    }

    playPad(); playBass(); playPings(); playTexture();
  }

  function stopMusic() {
    musicPlaying = false;
    for(const n of musicNodes) { try { n.disconnect(); } catch(e){} }

  // =============================================
  //  UPDATE
  // =============================================
  function update() {
    for (const s of starParticles) {
      s.flicker+=0.03;
      if(state===STATE.PLAYING) s.x-=s.speed*gameSpeed*0.3;
      if(s.x<0){ s.x=W; s.y=Math.random()*H; }
    }
    if(streakTimer>0){ streakTimer--; if(streakTimer===0)streakPopup.classList.remove("show"); }

    if (state===STATE.MENU) {
      bird.x=W*0.22; bird.y=H*0.42+Math.sin(Date.now()/400)*12;
      bird.angle=Math.sin(Date.now()/500)*0.1; bird.wingPhase+=0.15; return;
    }
    if (state===STATE.PLAYING) {
      const thrustMod=hasPerk('thrust_boost')?1.15:1;
      const gravMod=hasPerk('gravity_reduce')?0.88:1;
      if(isThrusting){bird.vy-=THRUST_POWER*thrustMod;if(bird.vy<-MAX_VY)bird.vy=-MAX_VY;}
      else{bird.vy+=DRIFT_GRAV*gravMod;if(bird.vy>MAX_VY)bird.vy=MAX_VY;}
      bird.vy*=0.98; bird.y+=bird.vy;
      bird.angle=Math.max(-0.5,Math.min(bird.vy*0.06,1.2));
      bird.wingPhase+=isThrusting?0.35:0.12;
      bird.trail.push({x:bird.x,y:bird.y,life:1});
      if(bird.trail.length>15)bird.trail.shift();
      for(const t of bird.trail) t.life-=0.07;
      if(isThrusting){
        // Double exhaust particles
        for(let i=0;i<2;i++){const a=Math.PI+Math.random()*0.6-0.3;particles.push({x:bird.x-BIRD_SIZE*0.5,y:bird.y+(Math.random()-0.5)*4,vx:Math.cos(a)*4,vy:Math.sin(a)*2,life:0.6,decay:0.04,size:2+Math.random()*3,color:getSkinColors().thrust});}
        // Hot sparks 
        if(Math.random()>0.6) particles.push({x:bird.x-BIRD_SIZE*0.5,y:bird.y+(Math.random()-0.5)*6,vx:-2-Math.random()*3,vy:(Math.random()-0.5)*3,life:0.4,decay:0.05,size:1+Math.random(),color:'#ffffff'});
      }
      // Ambient environment sparks at high speed
      if(gameSpeed>3.5 && Math.random()>0.85) {
        particles.push({x:W+5,y:Math.random()*(H-GROUND_HEIGHT),vx:-gameSpeed*3,vy:(Math.random()-0.5)*0.5,life:0.5,decay:0.025,size:1+Math.random(),color:currentZone.accent});
      }
      // Power-up collection
      for(let i=powerUpOrbs.length-1;i>=0;i--) {
        const pu=powerUpOrbs[i];
        pu.x-=gameSpeed; pu.wobble+=0.06;
        if(pu.collected || pu.x < -30) { powerUpOrbs.splice(i,1); continue; }
        const dx=bird.x-pu.x, dy=bird.y-pu.y;
        if(dx*dx+dy*dy < 22*22) {
          pu.collected=true; powerUpOrbs.splice(i,1);
          const durMod = hasPerk('powerup_extend') ? 1.3 : 1;
          activePowerUp=pu.type; powerUpTimer=Math.round(pu.type.dur * durMod);
          powerupHud.textContent=`${pu.type.icon} ${pu.type.desc}`;
          powerupHud.style.color=pu.type.color;
          powerupHud.classList.add('visible');
          playSound('powerup'); haptic();
          burst(pu.x,pu.y,pu.type.color,20);
          showStreak(`${pu.type.icon} ${pu.type.desc}!`);
        }
      }
      // Power-up timer
      if(activePowerUp) {
        powerUpTimer--;
        if(powerUpTimer<=0) { activePowerUp=null; powerupHud.classList.remove('visible'); }
        // Magnet: attract coins
        if(activePowerUp && activePowerUp.id==='magnet') {
          for(const c of floatingCoins) {
            if(c.collected) continue;
            const dx=bird.x-c.x, dy=bird.y-c.y;
            const dist=Math.sqrt(dx*dx+dy*dy);
            const magnetRange = hasPerk('coin_magnet') ? 168 : 120;
            if(dist < magnetRange) { c.x+=dx/dist*4; c.y+=dy/dist*4; }
          }
        }
        // Slow-mo
        if(activePowerUp && activePowerUp.id==='slowmo') {
          gameSpeed=Math.max(PIPE_SPEED_START*0.5, gameSpeed*0.97);
        }
      }

      groundX-=gameSpeed; if(groundX<-40) groundX+=40;
      pipeTimer-=gameSpeed; if(pipeTimer<=0){ spawnPipe(); pipeTimer=PIPE_SPACING; }

      // Zbieranie monet (kolizja z ptakiem)
      for(let i=floatingCoins.length-1;i>=0;i--) {
        const c=floatingCoins[i];
        c.x-=gameSpeed;
        c.wobble+=0.05;
        if(c.x < -20) { floatingCoins.splice(i,1); continue; }
        if(c.collected) continue;
        // Magnet radius already handled above
        const dx=bird.x-c.x, dy=bird.y-c.y;
        if(dx*dx+dy*dy < 20*20) {
          c.collected=true;
          const amt = (c.bonus ? 3 : 1) * (activePowerUp && activePowerUp.id==='x2' ? 2 : 1);
          addCoins(amt); playSound("coin"); addCombo();
          showCoinPopup(c.x, c.y-15, amt);
          burst(c.x, c.y, "#ffee00", 8);
          floatingCoins.splice(i,1);
        }
      }

      for(let i=pipes.length-1;i>=0;i--) {
        const p=pipes[i];
        p.x-=gameSpeed;
        if(p.moving){p.topH+=p.moveDir*p.moveSpeed;if(p.topH<=p.moveMin||p.topH>=p.moveMax)p.moveDir*=-1;}
        if(p.glow>0) p.glow-=0.03;
        const pRight=p.x-(56-PIPE_WIDTH)/2+56; // right edge of visual panel
        if(!p.scored && pRight<bird.x) {
          p.scored=true; p.glow=1;
          const pts=Math.max(1,Math.floor(comboMultiplier));
          score+=pts;
          scoreDisplay.textContent=score;
          playSound("score"); addCombo(); checkZone(); spawnSpeedLines();
          const distTop=Math.abs(bird.y-p.topH),distBot=Math.abs(bird.y-(p.topH+p.gap));
          const nearDist=Math.min(distTop,distBot);
          if(streakMilestones.includes(score)){playSound("milestone");showStreak(`🔥 ${score}!`);burst(W/2,H*0.3,"#ffee00",20);haptic();}
          else if(nearDist<25){driftCount++;addCoins(Math.ceil(2*comboMultiplier));showStreak(`⚡ DRIFT +${pts}×${comboMultiplier.toFixed(1)}`);burst(bird.x,bird.y,"#00ffaa",18);playSound("coin");haptic();chromAb=3;triggerBassPulse('drift');}
          else if(pts>1){showStreak(`+${pts} ×${comboMultiplier.toFixed(1)}`);}
          const speedMax = hasPerk('speed_cap') ? PIPE_SPEED_MAX * 0.92 : PIPE_SPEED_MAX;
          gameSpeed=Math.min(speedMax, PIPE_SPEED_START+score*0.025);
          pipeGap=Math.max(PIPE_GAP_MIN, PIPE_GAP_START-score*0.5);
        }
        if(p.x+56<-10) pipes.splice(i,1);
      }
      if(checkCollision()) {
        // Shield power-up save
        if(activePowerUp && activePowerUp.id==='shield') {
          activePowerUp=null; powerUpTimer=0; powerupHud.classList.remove('visible');
          shieldHits++; playSound('shield'); haptic(); shakeMag=6; flash=0.5;
          burst(bird.x,bird.y,'#00ffaa',20);
          bird.vy=bird.vy>0?-3:3; // bounce away from danger
          showStreak('🛡️ TARCZA!');
        } else if(hasPerk('second_chance') && !secondChanceUsed) {
          // CERBERUS perk: one free hit per game
          secondChanceUsed=true;
          playSound('shield'); haptic(); shakeMag=8; flash=0.6;
          burst(bird.x,bird.y,'#ff2200',25);
          bird.vy=bird.vy>0?-4:4;
          showStreak('🔥 CERBERUS — DRUGA SZANSA!');
        } else {
          state=STATE.DYING; playSound("hit"); haptic(); shakeMag=14; flash=1;
          chromAb=8; screenPulse=1; deathFreezeFrames=4;
          dyingTimer=0;
          timeScaleTarget=0.35; // brief bullet-time
          triggerBassPulse('hit');
          burst(bird.x,bird.y,"#ff4466",18); burst(bird.x,bird.y,"#ffee00",10);
          burst(bird.x,bird.y,"#ffffff",6);
          // Explosion ring
          for(let i=0;i<12;i++){const a=i/12*Math.PI*2;particles.push({x:bird.x,y:bird.y,vx:Math.cos(a)*6,vy:Math.sin(a)*6,life:0.7,decay:0.03,size:3,color:'#ff0066'});}
          // Debris
          for(let i=0;i<6;i++) envDebris.push({x:bird.x,y:bird.y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-3,rot:0,rotV:(Math.random()-0.5)*0.3,size:3+Math.random()*5,life:0.8,color:Math.random()>0.5?'#ff4466':'#ffee00'});
        }
      }
    }
    decayCombo();
    // Time scale lerp
    timeScale+=(timeScaleTarget-timeScale)*0.18;
    if(Math.abs(timeScale-timeScaleTarget)<0.01) timeScale=timeScaleTarget;
    chromAb*=0.88; screenPulse*=0.85;
    // Env debris
    for(let i=envDebris.length-1;i>=0;i--) {
      const d=envDebris[i]; d.x+=d.vx; d.y+=d.vy; d.vy+=0.15; d.rot+=d.rotV; d.life-=0.012;
      if(d.life<=0) envDebris.splice(i,1);
    }
    if (state===STATE.DYING) {
      if(deathFreezeFrames>0){deathFreezeFrames--;} else {
      isThrusting=false;
      // Classic fall: accelerate down, spin
      bird.vy+=DRIFT_GRAV*2.5;
      if(bird.vy>MAX_VY*1.5) bird.vy=MAX_VY*1.5;
      bird.y+=bird.vy;
      bird.angle+=0.15;
      if(bird.angle>Math.PI*2) bird.angle-=Math.PI*2;
      shakeMag*=0.9; shakeX=(Math.random()-0.5)*shakeMag; shakeY=(Math.random()-0.5)*shakeMag;
      flash*=0.82;
      dyingTimer++;
      // Ramp timeScale back to normal quickly
      if(dyingTimer>6) timeScaleTarget+=(1-timeScaleTarget)*0.2;
      // Trail sparks while falling
      if(Math.random()>0.6) particles.push({x:bird.x+(Math.random()-0.5)*10,y:bird.y+(Math.random()-0.5)*10,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:0.5,decay:0.04,size:2+Math.random()*3,color:Math.random()>0.5?'#ff4466':'#ff8800'});
      // End: hit ground or timeout → show game over
      const groundY = H - GROUND_HEIGHT;
      if(bird.y > groundY || dyingTimer > 90) {
        bird.y = Math.min(bird.y, groundY);
        state=STATE.DEAD; timeScale=1; timeScaleTarget=1; chromAb=0;
        showGameOver();
      }
      }
    }
    for(let i=particles.length-1;i>=0;i--) {
      const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay;
      if(p.life<=0) particles.splice(i,1);
    }
    // Speed lines
    for(let i=speedLines.length-1;i>=0;i--) {
      const sl=speedLines[i]; sl.x-=gameSpeed*3; sl.life-=0.03;
      if(sl.life<=0||sl.x+sl.len<0) speedLines.splice(i,1);
    }
    checkAchievements();
  }

  // =============================================
  //  DRAWING
  // =============================================
  function drawBackground() {
    const z=currentZone;
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,z.bg1); grad.addColorStop(0.4,z.bg2);
    grad.addColorStop(0.7,z.bg3); grad.addColorStop(1,z.bg1);
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    // Stars
    for(const s of starParticles) {
      ctx.globalAlpha=0.3+Math.sin(s.flicker)*0.3; ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    // === FAR LAYER: Nebula clouds ===
    const nebulaT=Date.now()*0.0001;
    for(let i=0;i<4;i++) {
      const nx=(nebulaT*20+i*W*0.4)%(W*1.5)-W*0.25;
      const ny=H*0.2+Math.sin(nebulaT+i*2)*H*0.15;
      const nr=80+i*35;
      ctx.globalAlpha=0.035;
      const nebGrad=ctx.createRadialGradient(nx,ny,0,nx,ny,nr);
      nebGrad.addColorStop(0,z.accent); nebGrad.addColorStop(0.5,z.laser+'30'); nebGrad.addColorStop(1,'transparent');
      ctx.fillStyle=nebGrad;
      ctx.beginPath(); ctx.arc(nx,ny,nr,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    // === MID LAYER: Industrial structures (parallax 0.3x) ===
    const midOff=state===STATE.PLAYING?groundX*0.3:Date.now()*0.005;
    ctx.globalAlpha=0.15;
    for(let i=0;i<5;i++) {
      const sx=((midOff+i*W*0.28)%(W*1.4))-W*0.2;
      const sBaseY=H-GROUND_HEIGHT-30;
      const tw=8+(i%3)*4, th=60+(i%4)*40;
      ctx.fillStyle=z.bg3; ctx.fillRect(sx,sBaseY-th,tw,th);
      ctx.strokeStyle=z.accent; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(sx+tw/2,sBaseY-th); ctx.lineTo(sx+tw/2,sBaseY-th-15); ctx.stroke();
      if(Math.sin(Date.now()*0.003+i*1.5)>0.5) {
        ctx.fillStyle=z.accent; ctx.shadowColor=z.accent; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(sx+tw/2,sBaseY-th-15,2,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
      }
      ctx.strokeStyle=z.bg2;
      for(let by=sBaseY-th+15;by<sBaseY;by+=20) {
        ctx.beginPath(); ctx.moveTo(sx,by); ctx.lineTo(sx+tw,by+10); ctx.stroke();
      }
    }
    ctx.globalAlpha=1;
    // === NEAR LAYER: City skyline (parallax 0.6x) ===
    const cityOff=state===STATE.PLAYING?groundX*0.6:Date.now()*0.008;
    const cityY=H-GROUND_HEIGHT-50;
    for(let x=0;x<W+30;x+=25+Math.sin(x*0.08)*15) {
      const bx=((x+cityOff)%(W+60))-30;
      const h=15+Math.abs(Math.sin(x*0.04))*55;
      const by=cityY+50-h;
      ctx.fillStyle="rgba(10,10,35,0.8)";
      ctx.fillRect(bx,by,16+Math.sin(x)*6,h);
      ctx.fillStyle="rgba(0,200,255,0.15)";
      for(let wy=by+4;wy<by+h-6;wy+=8) {
        if(Math.sin(x*3+wy*2)>0.3) ctx.fillRect(bx+3,wy,4,3);
        if(Math.sin(x*5+wy)>0.4) ctx.fillRect(bx+9,wy,4,3);
      }
    }
    // Floating hologram rings
    ctx.strokeStyle=z.accent; ctx.lineWidth=1;
    const holoOff=Date.now()*0.008;
    for(let i=0;i<3;i++) {
      const hx=(holoOff*25+i*W/3)%W, hy=H*0.25+Math.sin(holoOff*0.5+i)*40;
      ctx.globalAlpha=0.025+Math.sin(holoOff+i*2)*0.01;
      ctx.beginPath(); ctx.ellipse(hx,hy,30+i*8,8+i*3,0.2+Math.sin(holoOff*0.3+i)*0.3,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=1;
    // === DATA STREAM LINES ===
    const dsOff=Date.now()*0.05;
    for(let i=0;i<6;i++) {
      const dy=H*0.15+i*H*0.12, dx=(dsOff+i*200)%(W+300)-150, dLen=40+i*15;
      ctx.globalAlpha=0.06;
      const dsGrad=ctx.createLinearGradient(dx,dy,dx+dLen,dy);
      dsGrad.addColorStop(0,'transparent'); dsGrad.addColorStop(0.5,z.accent); dsGrad.addColorStop(1,'transparent');
      ctx.strokeStyle=dsGrad; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(dx,dy); ctx.lineTo(dx+dLen,dy); ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  function drawPipe(p) {
    const topH=p.topH, botY=topH+p.gap;
    const z=currentZone;
    const PANEL_W=56;
    const px=p.x-(PANEL_W-PIPE_WIDTH)/2; // center visual around hitbox
    const cx=px+PANEL_W/2; // center x
    const beamFlicker=0.7+Math.sin(Date.now()/80+p.x)*0.3;
    // === TOP WALL PANEL ===
    const tGrad=ctx.createLinearGradient(px,0,px+PANEL_W,0);
    tGrad.addColorStop(0,'#080c14'); tGrad.addColorStop(0.12,'#0e1a2a');
    tGrad.addColorStop(0.5,'#142840'); tGrad.addColorStop(0.88,'#0e1a2a');
    tGrad.addColorStop(1,'#080c14');
    ctx.fillStyle=tGrad; ctx.fillRect(px,0,PANEL_W,topH);
    // Panel edge glow
    ctx.strokeStyle='rgba(0,180,255,0.18)'; ctx.lineWidth=1;
    ctx.strokeRect(px+1,0,PANEL_W-2,topH);
    // Horizontal circuit traces
    ctx.strokeStyle='rgba(0,140,220,0.07)'; ctx.lineWidth=1;
    for(let y=18;y<topH-8;y+=24) {
      ctx.beginPath(); ctx.moveTo(px+8,y); ctx.lineTo(px+PANEL_W-8,y); ctx.stroke();
      if(Math.sin(y*0.12+Date.now()*0.003)>0.3) {
        ctx.fillStyle=z.accent+'44';
        ctx.beginPath(); ctx.arc(px+8+(y%3)*14,y,1.5,0,Math.PI*2); ctx.fill();
      }
    }
    // Vertical circuit traces
    ctx.strokeStyle='rgba(0,140,220,0.05)';
    for(let x=px+12;x<px+PANEL_W-8;x+=16) {
      ctx.beginPath(); ctx.moveTo(x,8); ctx.lineTo(x,topH-8); ctx.stroke();
    }
    // Warning stripes near emitter
    for(let sy=topH-28;sy<topH-10;sy+=6) {
      ctx.fillStyle=(sy/6)%2===0?'rgba(255,180,0,0.06)':'transparent';
      ctx.fillRect(px+4,sy,PANEL_W-8,3);
    }
    // TOP EMITTER (gate frame)
    const emH=12;
    ctx.fillStyle='#0c1e30'; ctx.fillRect(px-6,topH-emH,PANEL_W+12,emH);
    ctx.fillStyle=z.laser+'66'; ctx.fillRect(px-2,topH-emH+2,PANEL_W+4,emH-4);
    ctx.shadowColor=z.laser; ctx.shadowBlur=12;
    ctx.fillStyle=z.laser; ctx.fillRect(px+2,topH-3,PANEL_W-4,2);
    ctx.shadowBlur=0;
    // Status LEDs
    for(let lx=px+8;lx<px+PANEL_W-4;lx+=10) {
      ctx.fillStyle=Math.sin(Date.now()*0.005+lx)>0?z.accent:'#0a0a1a';
      ctx.beginPath(); ctx.arc(lx,topH-emH+5,1.2,0,Math.PI*2); ctx.fill();
    }
    // === BOTTOM WALL PANEL ===
    const bGrad=ctx.createLinearGradient(px,botY,px+PANEL_W,botY);
    bGrad.addColorStop(0,'#080c14'); bGrad.addColorStop(0.12,'#0e1a2a');
    bGrad.addColorStop(0.5,'#142840'); bGrad.addColorStop(0.88,'#0e1a2a');
    bGrad.addColorStop(1,'#080c14');
    ctx.fillStyle=bGrad; ctx.fillRect(px,botY,PANEL_W,H-botY-GROUND_HEIGHT);
    ctx.strokeStyle='rgba(0,180,255,0.18)'; ctx.lineWidth=1;
    ctx.strokeRect(px+1,botY,PANEL_W-2,H-botY-GROUND_HEIGHT);
    // Horizontal circuit traces (bottom)
    ctx.strokeStyle='rgba(0,140,220,0.07)'; ctx.lineWidth=1;
    for(let y=botY+18;y<H-GROUND_HEIGHT-8;y+=24) {
      ctx.beginPath(); ctx.moveTo(px+8,y); ctx.lineTo(px+PANEL_W-8,y); ctx.stroke();
      if(Math.sin(y*0.12+Date.now()*0.003)>0.3) {
        ctx.fillStyle=z.accent+'44';
        ctx.beginPath(); ctx.arc(px+PANEL_W-8-(y%3)*14,y,1.5,0,Math.PI*2); ctx.fill();
      }
    }
    // Vertical circuit traces (bottom)
    ctx.strokeStyle='rgba(0,140,220,0.05)';
    for(let x=px+12;x<px+PANEL_W-8;x+=16) {
      ctx.beginPath(); ctx.moveTo(x,botY+8); ctx.lineTo(x,H-GROUND_HEIGHT-8); ctx.stroke();
    }
    // Warning stripes near emitter (bottom)
    for(let sy=botY+10;sy<botY+28;sy+=6) {
      ctx.fillStyle=(sy/6)%2===0?'rgba(255,180,0,0.06)':'transparent';
      ctx.fillRect(px+4,sy,PANEL_W-8,3);
    }
    // BOTTOM EMITTER
    ctx.fillStyle='#0c1e30'; ctx.fillRect(px-6,botY,PANEL_W+12,emH);
    ctx.fillStyle=z.laser+'66'; ctx.fillRect(px-2,botY+2,PANEL_W+4,emH-4);
    ctx.shadowColor=z.laser; ctx.shadowBlur=12;
    ctx.fillStyle=z.laser; ctx.fillRect(px+2,botY+1,PANEL_W-4,2);
    ctx.shadowBlur=0;
    for(let lx=px+8;lx<px+PANEL_W-4;lx+=10) {
      ctx.fillStyle=Math.sin(Date.now()*0.005+lx+1)>0?z.accent:'#0a0a1a';
      ctx.beginPath(); ctx.arc(lx,botY+emH-5,1.2,0,Math.PI*2); ctx.fill();
    }
    // === ENERGY FIELD IN GAP ===
    ctx.globalAlpha=beamFlicker*0.1;
    const eGrad=ctx.createLinearGradient(px,topH,px,botY);
    eGrad.addColorStop(0,z.laser); eGrad.addColorStop(0.5,'transparent'); eGrad.addColorStop(1,z.laser);
    ctx.fillStyle=eGrad; ctx.fillRect(px,topH,PANEL_W,p.gap);
    ctx.globalAlpha=1;
    // Horizontal scan line in gap
    const scanY=topH+(Date.now()*0.05+p.x)%(p.gap);
    ctx.globalAlpha=0.15; ctx.strokeStyle=z.laser; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px+4,scanY); ctx.lineTo(px+PANEL_W-4,scanY); ctx.stroke();
    ctx.globalAlpha=1;
    // === GATE FRAME (corner brackets) ===
    const cLen=14;
    ctx.strokeStyle=z.accent; ctx.lineWidth=2.5; ctx.shadowColor=z.accent; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(px-3,topH+cLen); ctx.lineTo(px-3,topH); ctx.lineTo(px+cLen,topH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+PANEL_W+3,topH+cLen); ctx.lineTo(px+PANEL_W+3,topH); ctx.lineTo(px+PANEL_W-cLen,topH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px-3,botY-cLen); ctx.lineTo(px-3,botY); ctx.lineTo(px+cLen,botY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+PANEL_W+3,botY-cLen); ctx.lineTo(px+PANEL_W+3,botY); ctx.lineTo(px+PANEL_W-cLen,botY); ctx.stroke();
    ctx.shadowBlur=0;
    // Gate center crosshair
    const gapMid=topH+p.gap/2;
    ctx.globalAlpha=0.12; ctx.strokeStyle=z.accent; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-8,gapMid); ctx.lineTo(cx+8,gapMid); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,gapMid-8); ctx.lineTo(cx,gapMid+8); ctx.stroke();
    ctx.globalAlpha=1;
    // Score glow on gap
    if(p.glow>0) {
      ctx.fillStyle=`rgba(0,255,200,${p.glow*0.2})`;
      ctx.fillRect(px-6,topH,PANEL_W+12,p.gap);
    }

  }

  function drawFloatingCoins() {
    for(const c of floatingCoins) {
      if(c.collected) continue;
      const wobble=Math.sin(c.wobble)*3;
      const r = c.bonus ? 10 : 8;
      ctx.save();
      ctx.shadowColor=c.bonus?"#ff00e6":"#ffee00"; ctx.shadowBlur=12;
      ctx.fillStyle=c.bonus?"#ff66ff":"#ffee00";
      ctx.beginPath(); ctx.arc(c.x,c.y+wobble,r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=c.bonus?"#cc44cc":"#ffaa00";
      ctx.beginPath(); ctx.arc(c.x,c.y+wobble,r*0.6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=c.bonus?"#ff88ff":"#ffee00";
      ctx.font=`bold ${r-1}px sans-serif`; ctx.textAlign="center";
      ctx.fillText(c.bonus?"$":"$",c.x,c.y+wobble+3);
      ctx.restore();
    }
  }

  function drawGround() {
    const gy=H-GROUND_HEIGHT;
    const z=currentZone;
    const gGrad=ctx.createLinearGradient(0,gy,0,H);
    gGrad.addColorStop(0,z.ground); gGrad.addColorStop(0.15,z.bg1); gGrad.addColorStop(1,'#020008');
    ctx.fillStyle=gGrad; ctx.fillRect(0,gy,W,GROUND_HEIGHT);
    // Horizon glow line
    ctx.shadowColor=z.accent; ctx.shadowBlur=18;
    ctx.strokeStyle=z.accent; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
    ctx.shadowBlur=0;
    // Secondary glow
    ctx.strokeStyle="rgba(0,200,255,0.1)"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,gy+1); ctx.lineTo(W,gy+1); ctx.stroke();
    // Perspective grid
    ctx.strokeStyle="rgba(255,0,230,0.1)"; ctx.lineWidth=1;
    for(let x=groundX;x<W;x+=35){ ctx.beginPath(); ctx.moveTo(x,gy+2); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=gy+12;y<H;y+=12){
      const fade=1-((y-gy)/GROUND_HEIGHT)*0.7;
      ctx.strokeStyle=`rgba(255,0,230,${0.1*fade})`;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
    // === FLOWING LIGHT DOTS (data highway) ===
    const dotOff=Date.now()*0.06;
    ctx.fillStyle=z.accent;
    for(let lane=0;lane<3;lane++) {
      const ly=gy+8+lane*16;
      ctx.globalAlpha=0.3-lane*0.07;
      for(let i=0;i<10;i++) {
        const dx=(dotOff*(1.5-lane*0.3)+i*W/8)%W;
        ctx.beginPath(); ctx.arc(dx,ly,1.5,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha=1;
    // === GROUND STRUCTURES ===
    ctx.globalAlpha=0.35;
    for(let i=0;i<5;i++) {
      const gsx=((groundX*0.8+i*W*0.25)%(W+40))-20;
      if(i%2===0) {
        ctx.strokeStyle=z.bg2; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(gsx,gy); ctx.lineTo(gsx,gy-7-(i%3)*4); ctx.stroke();
        ctx.fillStyle=z.accent;
        ctx.beginPath(); ctx.arc(gsx,gy-7-(i%3)*4,1.5,0,Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle='#0a1525'; ctx.fillRect(gsx-4,gy-5,8,5);
        ctx.fillStyle=z.accent+'66'; ctx.fillRect(gsx-2,gy-4,2,2);
      }
    }
    ctx.globalAlpha=1;
  }

  function getSkinColors() {
    const s=SKINS.find(sk=>sk.id===equippedSkin)||SKINS[0];
    if(s.body==="rainbow") {
      const hue=(Date.now()/10)%360;
      return { body:`hsl(${hue},100%,60%)`, glow:`hsl(${hue},100%,50%)`, ring:`hsl(${(hue+120)%360},80%,40%)`, thrust:`hsl(${(hue+60)%360},100%,70%)` };
    }
    return { body:s.body, glow:s.glow, ring:s.ring, thrust:s.thrust };
  }

  function drawBird() {
    if(state===STATE.DEAD) return; // don't draw after explosion
    const sk=getSkinColors();
    ctx.save(); ctx.translate(bird.x,bird.y); ctx.rotate(bird.angle);
    const t=Date.now()*0.001;
    // Trail
    for(const tr of bird.trail) {
      if(tr.life<=0) continue;
      ctx.globalAlpha=tr.life*0.35; ctx.fillStyle=sk.thrust;
      ctx.beginPath(); ctx.arc(tr.x-bird.x,tr.y-bird.y,3*tr.life,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // === PER-SKIN UNIQUE DRONE CONSTRUCTION ===
    const coreR=BIRD_SIZE*0.36, ringR=BIRD_SIZE*0.58;
    const skinId=equippedSkin;

    if(skinId==="fire"){
      // ═══ RAPTOR — angular delta-wing fighter ═══
      const tB=isThrusting?1:0.25, tL=isThrusting?(20+Math.sin(t*30)*8):4;
      // DUAL AFTERBURNER EXHAUST
      ctx.shadowColor=sk.thrust; ctx.shadowBlur=isThrusting?40:8;
      for(const side of[-1,1]){
        // Outer cone
        ctx.fillStyle=sk.thrust; ctx.globalAlpha=tB*0.6;
        ctx.beginPath(); ctx.moveTo(-BIRD_SIZE*0.35,side*5);
        ctx.lineTo(-BIRD_SIZE*0.35-tL*1.3,side*9); ctx.lineTo(-BIRD_SIZE*0.35-tL*1.3,side*2); ctx.closePath(); ctx.fill();
        // Core flame
        ctx.fillStyle='#ffdd66'; ctx.globalAlpha=tB*0.8;
        ctx.beginPath(); ctx.moveTo(-BIRD_SIZE*0.35,side*5);
        ctx.lineTo(-BIRD_SIZE*0.35-tL,side*7); ctx.lineTo(-BIRD_SIZE*0.35-tL,side*3); ctx.closePath(); ctx.fill();
        if(isThrusting){
          // White hot core
          ctx.fillStyle='#fff'; ctx.globalAlpha=0.65;
          ctx.beginPath(); ctx.moveTo(-BIRD_SIZE*0.35,side*5);
          ctx.lineTo(-BIRD_SIZE*0.35-tL*0.4,side*6); ctx.lineTo(-BIRD_SIZE*0.35-tL*0.4,side*4.2); ctx.closePath(); ctx.fill();
          // Exhaust sparks
          for(let k=0;k<3;k++){
            ctx.fillStyle='#ffaa00'; ctx.globalAlpha=0.5+Math.random()*0.4;
            ctx.beginPath(); ctx.arc(-BIRD_SIZE*0.35-tL*(0.4+Math.random()*0.6),side*(3+Math.random()*5),0.8+Math.random(),0,Math.PI*2); ctx.fill();
          }
        }
      }
      ctx.shadowBlur=0; ctx.globalAlpha=1;
      // DELTA HULL with layered armor
      ctx.fillStyle=sk.body; ctx.shadowColor=sk.glow; ctx.shadowBlur=18;
      ctx.beginPath(); ctx.moveTo(BIRD_SIZE*0.7,0);
      ctx.lineTo(BIRD_SIZE*0.08,-BIRD_SIZE*0.2);
      ctx.lineTo(-BIRD_SIZE*0.5,-BIRD_SIZE*0.65);
      ctx.lineTo(-BIRD_SIZE*0.38,-BIRD_SIZE*0.08);
      ctx.lineTo(-BIRD_SIZE*0.38,BIRD_SIZE*0.08);
      ctx.lineTo(-BIRD_SIZE*0.5,BIRD_SIZE*0.65);
      ctx.lineTo(BIRD_SIZE*0.08,BIRD_SIZE*0.2);
      ctx.closePath(); ctx.fill();
      // Top armor plate (lighter shade)
      ctx.fillStyle='rgba(255,200,150,0.15)';
      ctx.beginPath(); ctx.moveTo(BIRD_SIZE*0.7,0); ctx.lineTo(BIRD_SIZE*0.08,-BIRD_SIZE*0.2);
      ctx.lineTo(-BIRD_SIZE*0.5,-BIRD_SIZE*0.65); ctx.lineTo(-BIRD_SIZE*0.38,0); ctx.closePath(); ctx.fill();
      // Wing edge neon trim
      ctx.strokeStyle=sk.glow; ctx.lineWidth=2; ctx.globalAlpha=0.85;
      ctx.beginPath(); ctx.moveTo(BIRD_SIZE*0.65,0); ctx.lineTo(-BIRD_SIZE*0.5,-BIRD_SIZE*0.65); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(BIRD_SIZE*0.65,0); ctx.lineTo(-BIRD_SIZE*0.5,BIRD_SIZE*0.65); ctx.stroke();
      // Tail fin edges
      ctx.strokeStyle=sk.ring; ctx.lineWidth=1.2; ctx.globalAlpha=0.5;
      ctx.beginPath(); ctx.moveTo(-BIRD_SIZE*0.5,-BIRD_SIZE*0.65); ctx.lineTo(-BIRD_SIZE*0.38,-BIRD_SIZE*0.08); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-BIRD_SIZE*0.5,BIRD_SIZE*0.65); ctx.lineTo(-BIRD_SIZE*0.38,BIRD_SIZE*0.08); ctx.stroke();
      // Center spine line
      ctx.strokeStyle=sk.glow; ctx.lineWidth=1; ctx.globalAlpha=0.35;
      ctx.beginPath(); ctx.moveTo(BIRD_SIZE*0.6,0); ctx.lineTo(-BIRD_SIZE*0.38,0); ctx.stroke();
      ctx.shadowBlur=0;
      // COCKPIT — animated HUD diamond
      ctx.fillStyle='#111'; ctx.globalAlpha=0.8;
      ctx.beginPath(); ctx.moveTo(BIRD_SIZE*0.3,0); ctx.lineTo(BIRD_SIZE*0.06,-BIRD_SIZE*0.1);
      ctx.lineTo(-BIRD_SIZE*0.12,0); ctx.lineTo(BIRD_SIZE*0.06,BIRD_SIZE*0.1); ctx.closePath(); ctx.fill();
      ctx.fillStyle=sk.glow; ctx.globalAlpha=0.3+Math.sin(t*6)*0.15;
      ctx.beginPath(); ctx.moveTo(BIRD_SIZE*0.3,0); ctx.lineTo(BIRD_SIZE*0.06,-BIRD_SIZE*0.1);
      ctx.lineTo(-BIRD_SIZE*0.12,0); ctx.lineTo(BIRD_SIZE*0.06,BIRD_SIZE*0.1); ctx.closePath(); ctx.fill();
      // HUD scan line inside cockpit
      const hsx=BIRD_SIZE*0.06+Math.sin(t*12)*BIRD_SIZE*0.08;

        for(var mc=0;mc<3;mc++){
          var cc=0x30A0+Math.floor(((t*8+mi*3+mc*7)%1)*96);
          var ch=String.fromCharCode(cc);
          var my=((t*35+mi*13+mc*15)%55)-27;
          ctx.fillStyle=mc===0?'#fff':'#00ff41';
          ctx.globalAlpha=mc===0?(0.6+Math.random()*0.3):(0.25+Math.random()*0.25);
          ctx.fillText(ch,mx,my);
        }
      }
      // GLITCH CORRUPTION BARS (more frequent, varied)
      for(var gb=0;gb<2;gb++){
        if(Math.random()>0.7){
          var gy=(Math.random()-0.5)*BIRD_SIZE*1.4;
          var gw=BIRD_SIZE*(0.4+Math.random()*1.2);
          ctx.fillStyle=Math.random()>0.5?'#00ff41':'#88ffaa';
          ctx.globalAlpha=0.15+Math.random()*0.1;
          ctx.fillRect(-gw/2,gy,gw,1.5+Math.random()*2.5);
        }
      }
      // HORIZONTAL SCAN LINE (sweeping)
      var scanY=((t*22)%2-1)*ringR*1.2;
      ctx.strokeStyle=sk.glow; ctx.lineWidth=1.2; ctx.globalAlpha=0.35;
      ctx.beginPath(); ctx.moveTo(-ringR*1.2,scanY); ctx.lineTo(ringR*1.2,scanY); ctx.stroke();
      // BLINKING CURSOR (terminal style)
      ctx.fillStyle=sk.glow; ctx.globalAlpha=Math.sin(t*8)>0?0.8:0;
      ctx.fillRect(BIRD_SIZE*0.4,-1,3,9);
      // DATA STREAM PARTICLES (flowing along cube edges)
      for(var dpi=0;dpi<6;dpi++){
        var de=edges[dpi%edges.length];
        var dprog=(t*2+dpi*0.5)%1;
        var dpx=proj[de[0]][0]+(proj[de[1]][0]-proj[de[0]][0])*dprog;
        var dpy=proj[de[0]][1]+(proj[de[1]][1]-proj[de[0]][1])*dprog;
        ctx.fillStyle='#fff'; ctx.globalAlpha=0.6;
        ctx.beginPath(); ctx.arc(dpx,dpy,1.5,0,Math.PI*2); ctx.fill();

      // PROCESS ID TEXT
      ctx.font='5px monospace'; ctx.fillStyle=sk.glow; ctx.globalAlpha=0.2;
      ctx.fillText('PID:'+Math.floor(t*10%999),BIRD_SIZE*0.3,-BIRD_SIZE*0.45);

    } else if(skinId==="cerberus"){
      // ═══ CERBERUS — trójgłowy piekielny pies ═══
      const tB=isThrusting?1:0.3;
      // HELLFIRE EXHAUST — chaotic flames from all 3 heads
      ctx.shadowColor='#ff2200'; ctx.shadowBlur=isThrusting?40:8;
      for(let i=0;i<(isThrusting?12:4);i++){
        const fx=-BIRD_SIZE*0.4-Math.random()*(isThrusting?30:8);
        const fy=(Math.random()-0.5)*18;
        ctx.fillStyle=i%3===0?'#ff0000':i%3===1?'#ff6600':'#ffcc00';
        ctx.globalAlpha=tB*(0.3+Math.random()*0.4);
        ctx.beginPath(); ctx.arc(fx,fy,2+Math.random()*4,0,Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur=0; ctx.globalAlpha=1;
      // MAIN BODY — armored hellhound torso
      ctx.fillStyle=sk.body; ctx.shadowColor=sk.glow; ctx.shadowBlur=18;
      ctx.beginPath();
      ctx.moveTo(BIRD_SIZE*0.2,0);
      ctx.lineTo(-BIRD_SIZE*0.1,-BIRD_SIZE*0.35);
      ctx.lineTo(-BIRD_SIZE*0.5,-BIRD_SIZE*0.3);
      ctx.lineTo(-BIRD_SIZE*0.5,BIRD_SIZE*0.3);
      ctx.lineTo(-BIRD_SIZE*0.1,BIRD_SIZE*0.35);
      ctx.closePath(); ctx.fill();
      // Armor cracks (lava veins)
      ctx.strokeStyle='#ff4400'; ctx.lineWidth=1; ctx.globalAlpha=0.5;
      for(let i=0;i<5;i++){
        const cx2=-BIRD_SIZE*0.3+Math.random()*BIRD_SIZE*0.4;
        const cy2=(Math.random()-0.5)*BIRD_SIZE*0.5;

        ctx.lineTo(cx2+Math.random()*8-4,cy2+Math.random()*8-4); ctx.stroke();

      // THREE HEADS — snapping jaws
      for(let h=0;h<3;h++){
        const hy=(h-1)*BIRD_SIZE*0.38;
        const hx=BIRD_SIZE*0.15+Math.abs(h-1)*BIRD_SIZE*0.15;
        const jawOpen=3+Math.sin(t*8+h*2.1)*3;
        // Skull
        ctx.fillStyle='#220000'; ctx.globalAlpha=0.9;
        ctx.beginPath(); ctx.ellipse(hx,hy,BIRD_SIZE*0.22,BIRD_SIZE*0.14,0,0,Math.PI*2); ctx.fill();
        // Upper jaw
        ctx.fillStyle=sk.body; ctx.globalAlpha=1;
        ctx.beginPath(); ctx.moveTo(hx+BIRD_SIZE*0.22,hy-jawOpen);
        ctx.lineTo(hx+BIRD_SIZE*0.35,hy-jawOpen-2);
        ctx.lineTo(hx-BIRD_SIZE*0.05,hy-jawOpen); ctx.closePath(); ctx.fill();
        // Lower jaw
        ctx.beginPath(); ctx.moveTo(hx+BIRD_SIZE*0.22,hy+jawOpen);
        ctx.lineTo(hx+BIRD_SIZE*0.35,hy+jawOpen+2);
        ctx.lineTo(hx-BIRD_SIZE*0.05,hy+jawOpen); ctx.closePath(); ctx.fill();
        // TEETH — jagged
        ctx.fillStyle='#ffeecc'; ctx.globalAlpha=0.9;
        for(let ti=0;ti<4;ti++){
          const tx=hx+BIRD_SIZE*0.05+ti*BIRD_SIZE*0.065;
          ctx.beginPath(); ctx.moveTo(tx,hy-jawOpen); ctx.lineTo(tx+2,hy-jawOpen+4); ctx.lineTo(tx-2,hy-jawOpen+4); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(tx,hy+jawOpen); ctx.lineTo(tx+2,hy+jawOpen-4); ctx.lineTo(tx-2,hy+jawOpen-4); ctx.closePath(); ctx.fill();
        }
        // HELLFIRE EYES — pulsing red
        ctx.fillStyle='#ff0000'; ctx.globalAlpha=0.7+Math.sin(t*10+h)*0.3;
        ctx.shadowColor='#ff0000'; ctx.shadowBlur=12;
        ctx.beginPath(); ctx.arc(hx-BIRD_SIZE*0.02,hy-BIRD_SIZE*0.05,2.5,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(hx+BIRD_SIZE*0.08,hy-BIRD_SIZE*0.05,2.5,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
      }
      // CHAINS — swinging between heads
      ctx.strokeStyle='#666'; ctx.lineWidth=2; ctx.globalAlpha=0.6;
      for(let c=0;c<2;c++){
        const cy1=(c-0.5)*BIRD_SIZE*0.38;
        ctx.beginPath();
        for(let cl=0;cl<8;cl++){
          const clx=-BIRD_SIZE*0.3+cl*BIRD_SIZE*0.08;
          const cly=cy1+Math.sin(t*3+cl*0.8+c)*3;
          cl===0?ctx.moveTo(clx,cly):ctx.lineTo(clx,cly);
        }
        ctx.stroke();
      }
      // BRIMSTONE PARTICLES — raining fire
      for(let i=0;i<8;i++){
        const pa=t*2.5+i*0.79;
        const pr=BIRD_SIZE*(0.4+Math.sin(t*3+i)*0.3);
        ctx.fillStyle=i%2?'#ff2200':'#ffaa00'; ctx.globalAlpha=0.4+Math.sin(t*6+i)*0.3;
        ctx.beginPath(); ctx.arc(Math.cos(pa)*pr,Math.sin(pa)*pr,1.5+Math.sin(t*8+i),0,Math.PI*2); ctx.fill();
      }
      // HELL AURA — pulsing rings of fire
      ctx.strokeStyle='#ff2200'; ctx.lineWidth=1.5; ctx.globalAlpha=0.08;
      for(let i=0;i<3;i++){
        const ar=BIRD_SIZE*(0.8+i*0.2)+Math.sin(t*3+i)*3;
        ctx.beginPath(); ctx.arc(0,0,ar,0,Math.PI*2); ctx.stroke();
      }

    } else if(skinId==="plague"){
      // ═══ PLAGUE — zaraza, rozkład, śmierć ═══
      const tB=isThrusting?1:0.3;
      // SPORE CLOUD EXHAUST
      ctx.shadowColor='#88aa00'; ctx.shadowBlur=isThrusting?25:5;
      for(let i=0;i<(isThrusting?10:3);i++){
        const fx=-BIRD_SIZE*0.4-Math.random()*(isThrusting?25:6);

        ctx.fillStyle=i%3===0?'#aacc22':i%3===1?'#667700':'#ccff44';

      }
      ctx.shadowBlur=0; ctx.globalAlpha=1;

      ctx.fillStyle=sk.body; ctx.shadowColor=sk.glow; ctx.shadowBlur=15;
      ctx.beginPath();
      for(let a=0;a<Math.PI*2;a+=0.05){

        const r2=coreR*1.5*rot*w;
        a<0.01?ctx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2):ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);
      }
      ctx.closePath(); ctx.fill();
      // PUSTULES (bulging boils)

        const pa=i*Math.PI*2/7+t*0.3;
        const pd=coreR*(0.6+Math.sin(t*2+i)*0.3);
        const ps=3+Math.sin(t*4+i)*2;
        ctx.fillStyle='#889900'; ctx.globalAlpha=0.7;
        ctx.beginPath(); ctx.arc(Math.cos(pa)*pd,Math.sin(pa)*pd,ps,0,Math.PI*2); ctx.fill();
        // Pus highlight
        ctx.fillStyle='#ccff44'; ctx.globalAlpha=0.5;
        ctx.beginPath(); ctx.arc(Math.cos(pa)*pd-1,Math.sin(pa)*pd-1,ps*0.4,0,Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur=0;
      // TOXIC DRIP — oozing slime
      for(let i=0;i<6;i++){
        const dx=(i-2.5)*6;
        const drip=(t*1.8+i*0.6)%1;
        ctx.fillStyle=i%2?'#aacc22':'#667700';
        ctx.globalAlpha=(1-drip)*0.6;
        // Drip stretching
        ctx.beginPath();
        ctx.moveTo(dx-2,coreR*1.3); ctx.lineTo(dx+2,coreR*1.3);
        ctx.lineTo(dx+1,coreR*1.3+drip*30); ctx.lineTo(dx-1,coreR*1.3+drip*30);
        ctx.closePath(); ctx.fill();
      }
      // BIOHAZARD SYMBOL (rotating, ominous)
      ctx.save(); ctx.rotate(t*0.5);
      ctx.strokeStyle='#ffcc00'; ctx.lineWidth=2; ctx.globalAlpha=0.35;
      // Three crescents of biohazard
      for(let i=0;i<3;i++){
        const ba=i*Math.PI*2/3;
        ctx.beginPath(); ctx.arc(Math.cos(ba)*5,Math.sin(ba)*5,coreR*0.4,ba-0.8,ba+0.8); ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(0,0,coreR*0.2,0,Math.PI*2); ctx.stroke();
      ctx.restore();
      // DEATH FLIES — buzzing around
      for(let i=0;i<5;i++){
        const fa=t*6+i*1.26;
        const fd=coreR*(0.8+Math.sin(t*4+i)*0.5);
        ctx.fillStyle='#222'; ctx.globalAlpha=0.6;
        ctx.beginPath(); ctx.arc(Math.cos(fa)*fd,Math.sin(fa)*fd,1.2,0,Math.PI*2); ctx.fill();
        // Wing
        ctx.strokeStyle='#555'; ctx.lineWidth=0.5; ctx.globalAlpha=0.4;
        ctx.beginPath(); ctx.arc(Math.cos(fa)*fd+1,Math.sin(fa)*fd-1,2,0,Math.PI); ctx.stroke();
      }
      // MIASMA CLOUD (expanding toxic fog)
      ctx.fillStyle='rgba(100,130,0,0.04)';
      ctx.beginPath(); ctx.arc(0,0,BIRD_SIZE*1.5+Math.sin(t*2)*5,0,Math.PI*2); ctx.fill();

    } else if(skinId==="kraken"){
      // ═══ KRAKEN — potwór z otchłani oceanu ═══
      const tB=isThrusting?1:0.3;
      // INK JET EXHAUST
      ctx.shadowColor='#00ccdd'; ctx.shadowBlur=isThrusting?30:6;
      for(let i=0;i<(isThrusting?8:2);i++){
        const fx=-BIRD_SIZE*0.4-Math.random()*(isThrusting?28:5);
        const fy=(Math.random()-0.5)*12;
        ctx.fillStyle=i%2?'#002233':'#005566';
        ctx.globalAlpha=tB*(0.3+Math.random()*0.3);
        ctx.beginPath(); ctx.arc(fx,fy,3+Math.random()*5,0,Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur=0; ctx.globalAlpha=1;
      // MASSIVE HEAD (bulging, terrifying)
      const breathe=1+Math.sin(t*3)*0.08;
      ctx.fillStyle=sk.body; ctx.shadowColor=sk.glow; ctx.shadowBlur=20;
      ctx.beginPath();
      ctx.moveTo(BIRD_SIZE*0.4,0);
      ctx.bezierCurveTo(BIRD_SIZE*0.4,-BIRD_SIZE*0.5,-BIRD_SIZE*0.1,-BIRD_SIZE*0.6*breathe,-BIRD_SIZE*0.4,-BIRD_SIZE*0.35*breathe);
      ctx.bezierCurveTo(-BIRD_SIZE*0.55,-BIRD_SIZE*0.15,-BIRD_SIZE*0.55,BIRD_SIZE*0.15,-BIRD_SIZE*0.4,BIRD_SIZE*0.35*breathe);
      ctx.bezierCurveTo(-BIRD_SIZE*0.1,BIRD_SIZE*0.6*breathe,BIRD_SIZE*0.4,BIRD_SIZE*0.5,BIRD_SIZE*0.4,0);
      ctx.closePath(); ctx.fill();
      // Barnacles / texture bumps
      ctx.fillStyle='#005566'; ctx.globalAlpha=0.3;
      for(let i=0;i<8;i++){
        const ba=i*0.79+t*0.1;
        const br=coreR*(0.5+Math.sin(i)*0.3);
        ctx.beginPath(); ctx.arc(Math.cos(ba)*br,Math.sin(ba)*br,2+Math.sin(t+i)*1,0,Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur=0;
      // 8 MASSIVE TENTACLES — writhing, crushing
      for(let i=0;i<8;i++){
        const ta=Math.PI*0.3+i*Math.PI*0.175;
        ctx.globalAlpha=0.85; ctx.strokeStyle=i%2?sk.body:'#003344'; ctx.lineCap='round';
        ctx.beginPath();
        let tx=Math.cos(ta)*coreR*1.1, ty=Math.sin(ta)*coreR*1.1;
        ctx.moveTo(tx,ty);
        for(let j=1;j<=9;j++){
          tx+=Math.cos(ta+Math.sin(t*2.5+i+j*0.6)*1.2)*6;
          ty+=Math.sin(ta+Math.sin(t*1.8+i-j*0.5)*0.9)*6;
          ctx.lineWidth=4.5-j*0.4;
          ctx.lineTo(tx,ty);
        }
        ctx.stroke();
        // SUCKERS on tentacles
        if(i%2===0){
          for(let s=2;s<8;s+=2){
            const sx=Math.cos(ta+Math.sin(t*2.5+i+s*0.6)*1.2)*s*5.5;
            const sy=Math.sin(ta+Math.sin(t*1.8+i-s*0.5)*0.9)*s*5.5;
            ctx.fillStyle='#00aacc'; ctx.globalAlpha=0.4;
            ctx.beginPath(); ctx.arc(Math.cos(ta)*coreR*1.1+sx*0.3,Math.sin(ta)*coreR*1.1+sy*0.3,1.5,0,Math.PI*2); ctx.fill();
          }
        }
        // Glowing tip
        ctx.fillStyle=sk.glow; ctx.globalAlpha=0.5+Math.sin(t*5+i)*0.3;

        ctx.beginPath(); ctx.arc(tx,ty,2,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
      }
      ctx.lineCap='butt';
      // GIANT EYE — terrifying, tracking
      ctx.fillStyle='#001111'; ctx.globalAlpha=0.95;
      ctx.beginPath(); ctx.ellipse(BIRD_SIZE*0.08,0,coreR*0.5,coreR*0.35,0,0,Math.PI*2); ctx.fill();
      // Iris (bioluminescent)
      ctx.fillStyle=sk.glow; ctx.globalAlpha=0.95;
      const ix=BIRD_SIZE*0.12+Math.sin(t*1.3)*3, iy=Math.sin(t*1.1)*2;
      ctx.beginPath(); ctx.arc(ix,iy,coreR*0.22,0,Math.PI*2); ctx.fill();
      // Pupil (horizontal slit — fish-like)
      ctx.fillStyle='#000'; ctx.globalAlpha=0.9;
      ctx.beginPath(); ctx.ellipse(ix,iy,coreR*0.16,coreR*0.04,0,0,Math.PI*2); ctx.fill();
      // Eye glow
      ctx.fillStyle='#fff'; ctx.globalAlpha=0.4;
      ctx.beginPath(); ctx.arc(ix+2,iy-2,coreR*0.07,0,Math.PI*2); ctx.fill();
      // BIOLUMINESCENT SPOTS
      for(let i=0;i<10;i++){
        const ba=t*0.5+i*0.63;
        const br=BIRD_SIZE*(0.25+Math.sin(t*1.5+i)*0.2);
        ctx.fillStyle=sk.glow; ctx.globalAlpha=0.15+Math.sin(t*3+i)*0.1;
        ctx.shadowColor=sk.glow; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(Math.cos(ba)*br,Math.sin(ba)*br,2+Math.sin(t*4+i),0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
      }
      // BUBBLES — deep sea
      for(let i=0;i<4;i++){
        const by=-coreR*(1+i*0.4)-((t*20+i*17)%40);
        const bx=(i-1.5)*5+Math.sin(t*2+i)*3;
        ctx.strokeStyle=sk.glow; ctx.lineWidth=0.8; ctx.globalAlpha=0.2;
        ctx.beginPath(); ctx.arc(bx,by,2+Math.random(),0,Math.PI*2); ctx.stroke();
      }

    } else if(skinId==="banshee"){
      // ═══ BANSHEE — krzycząca śmierć ═══
      const tB=isThrusting?0.7:0.15;
      const phase=0.6+Math.sin(t*3)*0.2;
      // SOUNDWAVE EXHAUST
      ctx.strokeStyle='#ccccff'; ctx.lineWidth=1.5;
      for(let i=0;i<(isThrusting?6:2);i++){
        const sw=-BIRD_SIZE*0.5-i*8;
        ctx.globalAlpha=tB*(0.3-i*0.04);
        ctx.beginPath(); ctx.arc(sw,0,4+i*3,Math.PI*0.3,Math.PI*1.7); ctx.stroke();
      }
      ctx.globalAlpha=1;
      // SCREAMING WRAITH BODY — distorted, flickering
      const flick=Math.random()>0.9?0.15:1;
      // Tattered cloak shape
      ctx.fillStyle='rgba(220,220,255,0.08)';
      ctx.shadowColor='rgba(200,200,255,0.6)'; ctx.shadowBlur=25;
      ctx.beginPath();
      ctx.moveTo(BIRD_SIZE*0.3,0);
      ctx.bezierCurveTo(BIRD_SIZE*0.2,-BIRD_SIZE*0.5,-BIRD_SIZE*0.3,-BIRD_SIZE*0.6,-BIRD_SIZE*0.5,-BIRD_SIZE*0.4);
      ctx.lineTo(-BIRD_SIZE*0.6,0);
      ctx.lineTo(-BIRD_SIZE*0.5,BIRD_SIZE*0.4);
      ctx.bezierCurveTo(-BIRD_SIZE*0.3,BIRD_SIZE*0.6,BIRD_SIZE*0.2,BIRD_SIZE*0.5,BIRD_SIZE*0.3,0);
      ctx.closePath(); ctx.fill();
      // Tattered bottom strips
      for(let i=0;i<5;i++){
        const sx=-BIRD_SIZE*0.4+i*BIRD_SIZE*0.15;
        const sl=BIRD_SIZE*(0.3+Math.sin(t*4+i)*0.15);
        ctx.strokeStyle='rgba(220,220,255,0.1)'; ctx.lineWidth=2;
        ctx.globalAlpha=phase*flick;
        ctx.beginPath(); ctx.moveTo(sx,BIRD_SIZE*0.35);
        ctx.bezierCurveTo(sx+Math.sin(t*3+i)*5,BIRD_SIZE*0.35+sl*0.5,sx+Math.sin(t*5+i)*8,BIRD_SIZE*0.35+sl,sx,BIRD_SIZE*0.35+sl);

      }
      ctx.shadowBlur=0;
      // SCREAMING MOUTH — wide open, horrifying
      ctx.globalAlpha=phase*2*flick;
      const mouthOpen=5+Math.sin(t*6)*3;
      // Dark void of mouth
